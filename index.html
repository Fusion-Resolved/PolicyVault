      const runSearch = useMemo(() => debounce(async ({ q, s }) => {
        setListLoading(true);
        const res = await apiSearch({ query: q, primary: s.primary || '', secondary: s.secondary || '', tertiary: s.tertiary || '' });
        setPolicies(res); setActiveIdx(-1); setListLoading(false);
      }, 280), []);

      useEffect(() => { if (authState === 'authenticated') runSearch({ q: query, s: sel }); }, [query, sel, authState]);

      const openPolicy = useCallback(async (p, idx) => {
        if (p.id === activeId && activePolicy) return;
        setActiveId(p.id); setActiveIdx(idx);
        setActivePolicy(null); setDetailLoading(true);
        setActivePolicy(await apiGetPolicy(p.id));
        setDetailLoading(false);
      }, [activeId, activePolicy]);

      useEffect(() => {
        if (authState !== 'authenticated') return;
        const h = e => {
          if (policyModal.open || usersModal) return;
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          if (e.key === 'ArrowDown') { e.preventDefault(); const n = Math.min(activeIdx + 1, policies.length - 1); if (policies[n]) openPolicy(policies[n], n); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); const n = Math.max(0, activeIdx - 1); if (policies[n]) openPolicy(policies[n], n); }
          else if (e.key === 'Escape') { setActiveId(null); setActivePolicy(null); setActiveIdx(-1); }
          else if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); searchRef.current?.focus(); }
          else if (e.key === 'n' && !e.metaKey && !e.ctrlKey) setPolicyModal({ open: true, mode: 'add' });
        };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [authState, policyModal.open, usersModal, activeIdx, policies, openPolicy]);

      const handleSavePolicy = async (saved) => {
        setPolicyModal({ open: false, mode: 'add' });
        await loadCats();
        runSearch({ q: query, s: sel });
        if (policyModal.mode === 'edit' && saved) { setActivePolicy(saved); setActiveId(saved.id); }
      };

      const handleSignOut = async () => {
        try { await authSignOut(); } catch (e) { console.warn('Sign out error:', e); }
        setUser(null); setProfile(null); setAuthState('unauthenticated'); setUserMenu(false);
      };
      const toggleDark = () => setDark(d => !d);
      const isAdmin    = profile?.role === 'admin';

      if (!configured)                     return <SetupScreen />;
      if (authState === 'loading')         return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, color: 'var(--text-3)' }}>
          <I.Spin />
          <span style={{ fontSize: 13 }}>Loading…</span>
          <button onClick={async () => { try { await authSignOut(); } catch(e) {} setUser(null); setProfile(null); setAuthState('unauthenticated'); }}
            style={{ marginTop: 8, background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 12, color: 'var(--text-3)', textDecoration: 'underline', fontFamily: 'var(--font-u)' }}>
            Taking too long? Click to sign out
          </button>
        </div>
      );
      if (authState === 'unauthenticated') return <AuthPage dark={dark} onToggleDark={toggleDark} />;
      if (authState === 'pending')         return <PendingPage profile={profile} dark={dark} onToggleDark={toggleDark} onSignOut={handleSignOut} />;

      return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          <header className="header-glass" style={{ height: 'var(--header-h)', display: 'flex', alignItems: 'center', padding: '0 16px', borderBottom: '1px solid var(--border)', flexShrink: 0, gap: 12, position: 'sticky', top: 0, zIndex: 10 }}>
            <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 22, fontWeight: 500, letterSpacing: '-0.03em', lineHeight: 1, flexShrink: 0 }}>
              Policy<span style={{ color: 'var(--accent)' }}>Vault</span>
            </h1>
            <div style={{ flex: 1, maxWidth: 520, position: 'relative', display: 'flex', alignItems: 'center' }}>
              <span style={{ position: 'absolute', left: 12, color: 'var(--text-3)', display: 'flex', pointerEvents: 'none' }}><I.Search /></span>
              <input ref={searchRef} type="text" placeholder="Search policies… (⌘K)" value={query} onChange={e => setQuery(e.target.value)} className="search-input"
                style={{ width: '100%', padding: '7px 32px 7px 34px', border: '1px solid var(--border-2)', borderRadius: 999, background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font-u)', fontSize: 13, outline: 'none', transition: 'all 0.15s' }} />
              {query && <button onClick={() => setQuery('')} style={{ position: 'absolute', right: 10, background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', padding: 2, borderRadius: '50%' }}><I.X /></button>}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginLeft: 'auto', flexShrink: 0 }}>
              <button onClick={toggleDark} title={dark ? 'Light mode' : 'Dark mode'} className="btn-icon"
                style={{ background: 'transparent', border: '1px solid var(--border-2)', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32, borderRadius: 'var(--r)', transition: 'all 0.15s' }}>
                {dark ? <I.Sun /> : <I.Moon />}
              </button>
              <Btn variant="primary" size="sm" onClick={() => setPolicyModal({ open: true, mode: 'add' })}><I.Plus /> New Policy</Btn>
              <div ref={userMenuRef} style={{ position: 'relative' }}>
                <button onClick={() => setUserMenu(v => !v)} title={profile?.email} className="btn-icon"
                  style={{ width: 32, height: 32, borderRadius: '50%', background: isAdmin ? 'var(--accent-bg)' : 'var(--surface-2)', border: `1.5px solid ${isAdmin ? 'var(--accent)' : 'var(--border-2)'}`, color: isAdmin ? 'var(--accent)' : 'var(--text-2)', cursor: 'pointer', fontSize: 11, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-u)', transition: 'all 0.15s' }}>
                  {initials(profile?.email)}
                </button>
                {userMenu && (
                  <div className="slide-up" style={{ position: 'absolute', right: 0, top: 'calc(100% + 8px)', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', minWidth: 210, boxShadow: 'var(--shadow-lg)', zIndex: 100, overflow: 'hidden' }}>
                    <div style={{ padding: '14px 16px', borderBottom: '1px solid var(--border)' }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{profile?.email}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-3)', display: 'flex', alignItems: 'center', gap: 4 }}>
                        {isAdmin ? <><I.Shield /><span style={{ color: 'var(--accent)', fontWeight: 700 }}>Administrator</span></> : <span>User</span>}
                      </div>
                    </div>
                    {isAdmin && (
                      <button onClick={() => { setUsersModal(true); setUserMenu(false); }} className="menu-item"
                        style={{ width: '100%', textAlign: 'left', padding: '10px 16px', background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 13, color: 'var(--text)', display: 'flex', alignItems: 'center', gap: 9, fontFamily: 'var(--font-u)', borderBottom: '1px solid var(--border)', transition: 'background 0.1s' }}>
                        <I.Users /> Manage Users
                      </button>
                    )}
                    <button onClick={handleSignOut} className="menu-item-danger"
                      style={{ width: '100%', textAlign: 'left', padding: '10px 16px', background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 13, color: 'var(--danger)', display: 'flex', alignItems: 'center', gap: 9, fontFamily: 'var(--font-u)', transition: 'background 0.1s' }}>
                      <I.LogOut /> Sign Out
                    </button>
                  </div>
                )}
              </div>
            </div>
          </header>

          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
            <Sidebar cats={cats} sel={sel} onSelect={ns => { setSel(ns); setActiveId(null); setActivePolicy(null); setActiveIdx(-1); }} loading={catsLoading} />
            <div style={{ width: 'var(--list-w)', minWidth: 'var(--list-w)', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              <div style={{ padding: '8px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
                <span style={{ fontSize: 11, color: 'var(--text-3)', fontWeight: 700, letterSpacing: '0.04em' }}>{listLoading ? 'Searching…' : `${policies.length} ${policies.length === 1 ? 'policy' : 'policies'}`}</span>
                {query && <span style={{ fontSize: 11, color: 'var(--accent)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 140, fontWeight: 700 }}>"{query}"</span>}
              </div>
              <PolicyList policies={policies} selectedId={activeId} onSelect={openPolicy} loading={listLoading} query={query} />
              {policies.length > 1 && (
                <div style={{ padding: '7px 16px', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                  <I.Kbd k="↑" /><I.Kbd k="↓" /><span style={{ fontSize: 11, color: 'var(--text-3)' }}>navigate</span>
                </div>
              )}
            </div>
            <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
              <PolicyDetail policy={activePolicy} loading={detailLoading} onEdit={() => setPolicyModal({ open: true, mode: 'edit' })} onNavigate={(ref) => openPolicy(ref, -1)} />
            </div>
          </div>

          <PolicyModal open={policyModal.open} mode={policyModal.mode} editPolicy={policyModal.mode === 'edit' ? activePolicy : null} cats={cats} onSave={handleSavePolicy} onClose={() => setPolicyModal(m => ({ ...m, open: false }))} />
          <UserManagementModal open={usersModal} currentUserId={user?.id} onClose={() => setUsersModal(false)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);


  </script>
</body>
</html>
