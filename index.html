<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PolicyVault">
  <meta name="description" content="Policy document management platform">
  <title>PolicyVault</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #F5F3EE;
      --surface:      #FDFCF9;
      --surface-2:    #EDEAE3;
      --surface-3:    #E2DED7;
      --text:         #18170F;
      --text-2:       #5C5A54;
      --text-3:       #9E9C96;
      --border:       rgba(0,0,0,0.065);
      --border-2:     rgba(0,0,0,0.11);
      --accent:       #1B5244;
      --accent-hover: #144038;
      --accent-bg:    #E4F0EC;
      --accent-text:  #0F3328;
      --accent-muted: rgba(27,82,68,0.09);
      --amber:        #8A5C0A;
      --amber-bg:     #FEF0CF;
      --danger:       #AE2E24;
      --danger-bg:    rgba(174,46,36,0.07);
      --sidebar-w:    244px;
      --list-w:       304px;
      --header-h:     58px;
      --font-d:       'Cormorant Garamond', Georgia, serif;
      --font-u:       'Plus Jakarta Sans', -apple-system, sans-serif;
      --r:            8px;
      --r-lg:         14px;
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:    0 4px 20px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05);
      --shadow-lg:    0 24px 64px rgba(0,0,0,0.14), 0 8px 20px rgba(0,0,0,0.07);
    }

    [data-dark="true"] {
      --bg:           #0E0F0D;
      --surface:      #161814;
      --surface-2:    #1E201C;
      --surface-3:    #262824;
      --text:         #EAE8E1;
      --text-2:       #888680;
      --text-3:       #525149;
      --border:       rgba(255,255,255,0.055);
      --border-2:     rgba(255,255,255,0.09);
      --accent:       #48B39E;
      --accent-hover: #5AC3AE;
      --accent-bg:    #0F2420;
      --accent-text:  #7DCFC3;
      --accent-muted: rgba(72,179,158,0.11);
      --amber:        #E0A840;
      --amber-bg:     #281E0C;
      --danger:       #D96B64;
      --danger-bg:    rgba(217,107,100,0.08);
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.18);
      --shadow-md:    0 4px 22px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.22);
      --shadow-lg:    0 28px 64px rgba(0,0,0,0.55), 0 8px 24px rgba(0,0,0,0.32);
    }

    html, body, #root { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-u);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 160px 160px;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    input, textarea, button, select { font-family: var(--font-u); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.9s linear infinite; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.24s cubic-bezier(0.22,1,0.36,1) both; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .slide-up { animation: slideUp 0.28s cubic-bezier(0.34,1.1,0.64,1) both; }

    @keyframes authIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .auth-in { animation: authIn 0.42s cubic-bezier(0.22,1,0.36,1) both; }

    .header-glass {
      background: rgba(253,252,249,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    [data-dark="true"] .header-glass {
      background: rgba(22,24,20,0.84);
    }

    .btn-icon:hover        { background: var(--surface-2) !important; }
    .sidebar-row:hover     { background: var(--surface-2) !important; color: var(--text) !important; }
    .policy-item:hover     { background: var(--surface-2) !important; }
    .menu-item:hover       { background: var(--surface-2) !important; }
    .menu-item-danger:hover { background: var(--danger-bg) !important; }

    .search-input:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px var(--accent-muted) !important;
    }
    .form-input:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px var(--accent-muted) !important;
    }

    .primary-btn { transition: all 0.16s cubic-bezier(0.22,1,0.36,1) !important; }
    .primary-btn:hover:not(:disabled) {
      background: var(--accent-hover) !important;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(27,82,68,0.28) !important;
    }
    .primary-btn:active:not(:disabled) { transform: translateY(0) !important; }
    [data-dark="true"] .primary-btn:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(72,179,158,0.3) !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Pinned to 2.49.4 — supports both sb_publishable_ and JWT anon key formats -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ══════════════════════════════════════════════════════════════
    //  CONFIGURATION
    //  These placeholders are replaced at build time by build.sh
    //  using values from Netlify environment variables.
    //  Never commit real credentials here.
    // ══════════════════════════════════════════════════════════════
    const SUPABASE_URL      = 'https://gcbstllhgwwvcjxcmyfd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_8giHceQEae5jy7EEAG4NQw_mVYWBuN1';

    const configured = SUPABASE_URL.startsWith('https://') && SUPABASE_ANON_KEY.length > 20;
    const db = configured
      ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { persistSession: true, autoRefreshToken: true, storageKey: 'pv-auth' }
        })
      : null;

    // ── Utilities ──────────────────────────────────────────────────
    const debounce = (fn, ms) => {
      let t;
      return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
    };
    const fmtDate = (iso) => iso
      ? new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
      : '';

    // ── Policy content metadata helpers ───────────────────────────
    const META_START = '__PV_META_START__';
    const META_END   = '__PV_META_END__';
    const parseContent = (raw) => {
      if (!raw) return { date: '', roles: '', author_name: '', author_role: '', series: [], body: '' };
      const s = raw.indexOf(META_START), e = raw.indexOf(META_END);
      if (s === 0 && e > 0) {
        try {
          const meta = JSON.parse(raw.slice(META_START.length, e));
          const body = raw.slice(e + META_END.length).replace(/^\n/, '');
          return { ...meta, series: meta.series || [], body };
        } catch {}
      }
      return { date: '', roles: '', author_name: '', author_role: '', series: [], body: raw };
    };
    const serializeContent = ({ date, roles, author_name, author_role, series, body }) => {
      const meta = JSON.stringify({ date: date.trim(), roles: roles.trim(), author_name: author_name.trim(), author_role: author_role.trim(), series: series || [] });
      return `${META_START}${meta}${META_END}\n${body}`;
    };

    const dedupe = (a, b) => {
      const s = new Set();
      return [...a, ...b].filter(x => { if (s.has(x.id)) return false; s.add(x.id); return true; });
    };
    const setArr = (s) => [...s].sort((a, b) => a.localeCompare(b));
    const initials = (email = '') => {
      const p = email.split('@')[0].split(/[._-]/);
      return p.slice(0, 2).map(x => x[0]?.toUpperCase() || '').join('') || '?';
    };

    // ── Auth helpers ───────────────────────────────────────────────
    const authSignIn  = (email, pw)  => db.auth.signInWithPassword({ email, password: pw });
    const authSignUp  = (email, pw)  => db.auth.signUp({ email, password: pw });
    const authSignOut = ()           => db.auth.signOut();

    const getAllProfiles = async () => {
      const { data } = await db.from('user_profiles').select('*').order('created_at', { ascending: false });
      return data || [];
    };
    const approveUser = (id) => db.rpc('approve_user', { target_id: id });
    const revokeUser  = (id) => db.rpc('revoke_user',  { target_id: id });
    const promoteUser = (id) => db.from('user_profiles').update({ role: 'admin' }).eq('id', id);
    const demoteUser  = (id) => db.from('user_profiles').update({ role: 'user'  }).eq('id', id);

    // ── Policies helpers ───────────────────────────────────────────
    const COLS = 'id,name,primary_category,secondary_category,tertiary_category,updated_at';

    const apiSearch = async ({ query = '', primary = '', secondary = '', tertiary = '' } = {}) => {
      if (!db) return [];
      const fil = q => {
        if (primary)   q = q.eq('primary_category', primary);
        if (secondary) q = q.eq('secondary_category', secondary);
        if (tertiary)  q = q.eq('tertiary_category', tertiary);
        return q;
      };
      if (query.trim()) {
        const [{ data: d1 }, { data: d2 }] = await Promise.all([
          fil(db.from('policies').select(COLS).ilike('name', `%${query}%`)),
          fil(db.from('policies').select(COLS).textSearch('search_vector', query, { type: 'websearch', config: 'english' })),
        ]);
        return dedupe(d1 || [], d2 || []);
      }
      const { data } = await fil(db.from('policies').select(COLS).order('updated_at', { ascending: false }));
      return data || [];
    };

    const apiGetPolicy = async (id) => {
      const { data } = await db.from('policies').select('*').eq('id', id).single();
      return data;
    };

    const apiGetCats = async () => {
      const { data } = await db.from('policies').select('primary_category,secondary_category,tertiary_category');
      if (!data) return { primaries: [], byPrimary: {}, bySecondary: {} };
      const pS = new Set(), byP = {}, byS = {};
      data.forEach(({ primary_category: p, secondary_category: s, tertiary_category: t }) => {
        if (!p) return;
        pS.add(p);
        if (s) {
          if (!byP[p]) byP[p] = new Set();
          byP[p].add(s);
          if (t) {
            const k = `${p}||${s}`;
            if (!byS[k]) byS[k] = new Set();
            byS[k].add(t);
          }
        }
      });
      return {
        primaries: setArr(pS),
        byPrimary:   Object.fromEntries(Object.entries(byP).map(([k, v]) => [k, setArr(v)])),
        bySecondary: Object.fromEntries(Object.entries(byS).map(([k, v]) => [k, setArr(v)])),
      };
    };

    const apiSave = async (form, id = null) => {
      const p = {
        name: form.name.trim(), content: form.content.trim(),
        primary_category:   form.primary_category.trim(),
        secondary_category: form.secondary_category?.trim() || null,
        tertiary_category:  form.tertiary_category?.trim()  || null,
      };
      if (id) return db.from('policies').update(p).eq('id', id).select().single();
      return db.from('policies').insert(p).select().single();
    };

    const apiGetReferences = async (policyId) => {
      if (!db) return [];
      const { data } = await db
        .from('policy_references')
        .select('order_index, referenced_policy:referenced_policy_id(id, name, primary_category, secondary_category, content)')
        .eq('policy_id', policyId)
        .order('order_index');
      return (data || []).map(d => d.referenced_policy).filter(Boolean);
    };

    const apiSaveReferences = async (policyId, referencedIds) => {
      if (!db) return;
      await db.from('policy_references').delete().eq('policy_id', policyId);
      if (referencedIds.length > 0) {
        const rows = referencedIds.map((refId, i) => ({
          policy_id: policyId,
          referenced_policy_id: refId,
          order_index: i,
        }));
        await db.from('policy_references').insert(rows);
      }
    };

    // ══════════════════════════════════════════════════════════════
    //  ICONS
    // ══════════════════════════════════════════════════════════════
    const I = {
      Search:  () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
      Sun:     () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>,
      Moon:    () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
      Plus:    () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      CRight:  () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>,
      CDown:   () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m6 9 6 6 6-6"/></svg>,
      Edit:    () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>,
      X:       () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Folder:  () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
      File2:   () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
      Spin:    () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" className="spin"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>,
      LogOut:  () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
      Users:   () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      Check:   () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Shield:  () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
      Eye:     () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      EyeOff:  () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
      Lock:    () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.6" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1.2" fill="white" stroke="none"/></svg>,
      Kbd:     ({ k }) => <kbd style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minWidth: 20, height: 20, padding: '0 5px', background: 'var(--surface-3)', border: '1px solid var(--border-2)', borderRadius: 5, fontSize: 10, fontFamily: 'monospace', color: 'var(--text-3)', letterSpacing: 0 }}>{k}</kbd>,
      Grip:    () => <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="9" cy="5" r="1.8"/><circle cx="15" cy="5" r="1.8"/><circle cx="9" cy="12" r="1.8"/><circle cx="15" cy="12" r="1.8"/><circle cx="9" cy="19" r="1.8"/><circle cx="15" cy="19" r="1.8"/></svg>,
      Link:    () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
    };

    // ── Button ─────────────────────────────────────────────────────
    const Btn = ({ children, onClick, variant = 'default', size = 'md', disabled, title, full, style: sx }) => {
      const base = { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 5, border: 'none', borderRadius: 'var(--r)', cursor: disabled ? 'not-allowed' : 'pointer', fontFamily: 'var(--font-u)', fontWeight: 600, opacity: disabled ? 0.45 : 1, whiteSpace: 'nowrap', transition: 'all 0.15s cubic-bezier(0.22,1,0.36,1)', userSelect: 'none', width: full ? '100%' : undefined, letterSpacing: '0.01em' };
      const sz = { sm: { padding: '5px 11px', fontSize: 11.5 }, md: { padding: '7px 14px', fontSize: 13 }, lg: { padding: '10px 20px', fontSize: 14 } };
      const vr = {
        default: { background: 'var(--surface)', color: 'var(--text)', border: '1px solid var(--border-2)', boxShadow: 'var(--shadow-sm)' },
        primary: { background: 'var(--accent)', color: '#fff', boxShadow: '0 2px 8px rgba(27,82,68,0.22)' },
        ghost:   { background: 'transparent', color: 'var(--text-2)' },
        danger:  { background: 'transparent', color: 'var(--danger)', border: '1px solid var(--danger)' },
        approve: { background: 'var(--accent-bg)', color: 'var(--accent)', border: '1px solid rgba(27,82,68,0.15)' },
      };
      return <button onClick={onClick} disabled={disabled} title={title} className={variant === 'primary' ? 'primary-btn' : ''} style={{ ...base, ...sz[size], ...vr[variant], ...sx }}>{children}</button>;
    };

    // ══════════════════════════════════════════════════════════════
    //  AUTH PAGE
    // ══════════════════════════════════════════════════════════════
    const AuthPage = ({ dark, onToggleDark }) => {
      const [mode, setMode]       = useState('signin');
      const [email, setEmail]     = useState('');
      const [pw, setPw]           = useState('');
      const [pw2, setPw2]         = useState('');
      const [showPw, setShowPw]   = useState(false);
      const [loading, setLoading] = useState(false);
      const [err, setErr]         = useState('');
      const [ok, setOk]           = useState('');
      const emailRef = useRef(null);

      useEffect(() => { setErr(''); setOk(''); setTimeout(() => emailRef.current?.focus(), 60); }, [mode]);

      const submit = async (e) => {
        e?.preventDefault(); setErr(''); setOk('');
        if (!email.trim()) { setErr('Email is required.'); return; }
        if (!pw)           { setErr('Password is required.'); return; }
        if (mode === 'signup') {
          if (pw.length < 8) { setErr('Password must be at least 8 characters.'); return; }
          if (pw !== pw2)    { setErr('Passwords do not match.'); return; }
        }
        setLoading(true);
        if (mode === 'signin') {
          const { error } = await authSignIn(email.trim(), pw);
          if (error) { setErr(error.message); setLoading(false); }
        } else {
          const { error } = await authSignUp(email.trim(), pw);
          setLoading(false);
          if (error) { setErr(error.message); return; }
          setOk('Request submitted. An administrator will review and approve your account.');
          setMode('signin'); setPw(''); setPw2('');
        }
      };

      const inp = { width: '100%', padding: '10px 13px', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font-u)', fontSize: 14, outline: 'none', transition: 'border-color 0.15s, box-shadow 0.15s' };
      const lbl = { fontSize: 11.5, fontWeight: 700, color: 'var(--text-2)', marginBottom: 6, display: 'block', letterSpacing: '0.03em' };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '2rem', position: 'relative', background: 'var(--bg)', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
            <div style={{ position: 'absolute', top: '-15%', right: '-8%', width: '55vw', height: '55vw', borderRadius: '50%', background: 'radial-gradient(circle, var(--accent-bg) 0%, transparent 68%)', opacity: 0.7 }} />
            <div style={{ position: 'absolute', bottom: '-12%', left: '-4%', width: '38vw', height: '38vw', borderRadius: '50%', background: 'radial-gradient(circle, var(--accent-muted) 0%, transparent 70%)', opacity: 0.5 }} />
          </div>

          <button onClick={onToggleDark} title={dark ? 'Light mode' : 'Dark mode'} className="btn-icon"
            style={{ position: 'absolute', top: 20, right: 20, background: 'var(--surface)', border: '1px solid var(--border-2)', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 36, height: 36, borderRadius: 'var(--r)', boxShadow: 'var(--shadow-sm)', transition: 'all 0.15s' }}>
            {dark ? <I.Sun /> : <I.Moon />}
          </button>

          <div className="auth-in" style={{ width: '100%', maxWidth: 400, position: 'relative' }}>
            <div style={{ textAlign: 'center', marginBottom: '2.5rem' }}>
              <div style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 56, height: 56, borderRadius: 16, background: 'var(--accent)', marginBottom: 18, boxShadow: '0 6px 20px rgba(27,82,68,0.28)' }}>
                <I.Lock />
              </div>
              <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 46, fontWeight: 400, letterSpacing: '-0.03em', lineHeight: 1 }}>
                Policy<span style={{ color: 'var(--accent)' }}>Vault</span>
              </h1>
              <p style={{ fontSize: 12.5, color: 'var(--text-3)', marginTop: 9, letterSpacing: '0.04em', textTransform: 'uppercase', fontWeight: 500 }}>Policy document management</p>
            </div>

            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', padding: '2rem', boxShadow: 'var(--shadow-md)' }}>
              <div style={{ display: 'flex', gap: 2, background: 'var(--surface-2)', borderRadius: 'calc(var(--r) + 2px)', padding: 3, marginBottom: '1.75rem' }}>
                {[['signin', 'Sign In'], ['signup', 'Request Access']].map(([m, label]) => (
                  <button key={m} onClick={() => setMode(m)}
                    style={{ flex: 1, padding: '7px 0', fontSize: 12.5, fontWeight: 700, border: 'none', borderRadius: 'var(--r)', cursor: 'pointer', fontFamily: 'var(--font-u)', letterSpacing: '0.01em', background: mode === m ? 'var(--surface)' : 'transparent', color: mode === m ? 'var(--text)' : 'var(--text-3)', boxShadow: mode === m ? 'var(--shadow-sm)' : 'none', transition: 'all 0.2s cubic-bezier(0.22,1,0.36,1)' }}>
                    {label}
                  </button>
                ))}
              </div>

              <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 15 }}>
                <div>
                  <label style={lbl}>Email address</label>
                  <input ref={emailRef} type="email" autoComplete="email" className="form-input" style={inp} value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" />
                </div>
                <div>
                  <label style={lbl}>Password {mode === 'signup' && <span style={{ color: 'var(--text-3)', fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>(min. 8 chars)</span>}</label>
                  <div style={{ position: 'relative' }}>
                    <input type={showPw ? 'text' : 'password'} autoComplete={mode === 'signin' ? 'current-password' : 'new-password'} className="form-input" style={{ ...inp, paddingRight: 42 }} value={pw} onChange={e => setPw(e.target.value)} placeholder={mode === 'signup' ? 'Choose a strong password' : 'Your password'} />
                    <button type="button" onClick={() => setShowPw(v => !v)} style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', padding: 2 }}>
                      {showPw ? <I.EyeOff /> : <I.Eye />}
                    </button>
                  </div>
                </div>
                {mode === 'signup' && (
                  <div>
                    <label style={lbl}>Confirm password</label>
                    <input type={showPw ? 'text' : 'password'} autoComplete="new-password" className="form-input" style={inp} value={pw2} onChange={e => setPw2(e.target.value)} placeholder="Repeat your password" />
                  </div>
                )}
                {err && <div style={{ fontSize: 12.5, color: 'var(--danger)', background: 'var(--danger-bg)', padding: '9px 13px', borderRadius: 'var(--r)', borderLeft: '3px solid var(--danger)', lineHeight: 1.55 }}>{err}</div>}
                {ok  && <div style={{ fontSize: 12.5, color: 'var(--accent)', background: 'var(--accent-bg)', padding: '9px 13px', borderRadius: 'var(--r)', borderLeft: '3px solid var(--accent)', lineHeight: 1.55 }}>{ok}</div>}
                <button type="submit" disabled={loading} className="primary-btn"
                  style={{ width: '100%', padding: '11px', marginTop: 4, background: loading ? 'var(--accent-bg)' : 'var(--accent)', color: loading ? 'var(--accent)' : '#fff', border: 'none', borderRadius: 'var(--r)', fontFamily: 'var(--font-u)', fontSize: 14, fontWeight: 700, cursor: loading ? 'not-allowed' : 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, letterSpacing: '0.02em' }}>
                  {loading && <I.Spin />}
                  {loading ? 'Please wait…' : mode === 'signin' ? 'Sign In' : 'Request Access'}
                </button>
              </form>
              {mode === 'signup' && (
                <p style={{ fontSize: 11.5, color: 'var(--text-3)', marginTop: 16, lineHeight: 1.7, textAlign: 'center' }}>
                  New accounts require administrator approval before access is granted.
                </p>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    //  PENDING PAGE
    // ══════════════════════════════════════════════════════════════
    const PendingPage = ({ profile, dark, onToggleDark, onSignOut }) => (
      <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '2rem', position: 'relative', background: 'var(--bg)', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
          <div style={{ position: 'absolute', top: '5%', left: '50%', transform: 'translateX(-50%)', width: '50vw', height: '50vw', borderRadius: '50%', background: 'radial-gradient(circle, var(--amber-bg) 0%, transparent 68%)', opacity: 0.55 }} />
        </div>
        <button onClick={onToggleDark} className="btn-icon" style={{ position: 'absolute', top: 20, right: 20, background: 'var(--surface)', border: '1px solid var(--border-2)', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 36, height: 36, borderRadius: 'var(--r)', boxShadow: 'var(--shadow-sm)', transition: 'all 0.15s' }}>
          {dark ? <I.Sun /> : <I.Moon />}
        </button>
        <div className="auth-in" style={{ width: '100%', maxWidth: 400, textAlign: 'center', position: 'relative' }}>
          <div style={{ width: 64, height: 64, borderRadius: 18, background: 'var(--amber-bg)', border: '1px solid rgba(138,92,10,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 1.5rem', color: 'var(--amber)', boxShadow: '0 4px 18px rgba(138,92,10,0.14)' }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <h2 style={{ fontFamily: 'var(--font-d)', fontSize: 32, fontWeight: 400, marginBottom: 12, letterSpacing: '-0.02em' }}>Awaiting Approval</h2>
          <p style={{ color: 'var(--text-2)', fontSize: 14, lineHeight: 1.7, marginBottom: 6 }}>Your account for <strong style={{ color: 'var(--text)', fontWeight: 600 }}>{profile?.email}</strong> is pending review.</p>
          <p style={{ color: 'var(--text-3)', fontSize: 13, lineHeight: 1.7, marginBottom: '2.5rem' }}>An administrator will grant access shortly. Sign in again once you've been notified.</p>
          <Btn variant="default" onClick={onSignOut}><I.LogOut /> Sign Out</Btn>
        </div>
      </div>
    );

    // ══════════════════════════════════════════════════════════════
    //  USER MANAGEMENT MODAL
    // ══════════════════════════════════════════════════════════════
    const UserManagementModal = ({ open, currentUserId, onClose }) => {
      const [users, setUsers]   = useState([]);
      const [loading, setLoading] = useState(false);
      const [busy, setBusy]     = useState({});

      const load = useCallback(async () => { setLoading(true); setUsers(await getAllProfiles()); setLoading(false); }, []);
      useEffect(() => { if (open) load(); }, [open]);

      const act = async (fn, id) => { setBusy(b => ({ ...b, [id]: true })); await fn(id); await load(); setBusy(b => ({ ...b, [id]: false })); };

      if (!open) return null;
      const pending  = users.filter(u => !u.approved);
      const approved = users.filter(u =>  u.approved);

      const UserRow = ({ u }) => (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid var(--border)' }}>
          <div style={{ width: 34, height: 34, borderRadius: '50%', background: u.approved ? 'var(--accent-bg)' : 'var(--surface-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: u.approved ? 'var(--accent)' : 'var(--text-3)', flexShrink: 0, border: `1px solid ${u.approved ? 'rgba(27,82,68,0.15)' : 'var(--border)'}` }}>
            {initials(u.email)}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', display: 'flex', alignItems: 'center', gap: 6 }}>
              {u.email}
              {u.id === currentUserId && <span style={{ fontSize: 10, padding: '2px 7px', background: 'var(--accent-muted)', color: 'var(--accent)', borderRadius: 100, fontWeight: 700 }}>you</span>}
              {u.role === 'admin' && <span style={{ fontSize: 10, padding: '2px 7px', background: 'var(--surface-3)', color: 'var(--text-3)', borderRadius: 100, display: 'inline-flex', alignItems: 'center', gap: 3, fontWeight: 600 }}><I.Shield /> admin</span>}
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>Requested {fmtDate(u.created_at)}{u.approved_at && ` · Approved ${fmtDate(u.approved_at)}`}</div>
          </div>
          {u.id !== currentUserId && (
            <div style={{ display: 'flex', gap: 5, flexShrink: 0 }}>
              {!u.approved
                ? <Btn variant="approve" size="sm" disabled={busy[u.id]} onClick={() => act(approveUser, u.id)}><I.Check /> Approve</Btn>
                : <>
                    {u.role === 'user'
                      ? <Btn variant="default" size="sm" disabled={busy[u.id]} onClick={() => act(promoteUser, u.id)}><I.Shield /> Make Admin</Btn>
                      : <Btn variant="default" size="sm" disabled={busy[u.id]} onClick={() => act(demoteUser,  u.id)}>Demote</Btn>
                    }
                    <Btn variant="danger" size="sm" disabled={busy[u.id]} onClick={() => act(revokeUser, u.id)}>Revoke</Btn>
                  </>
              }
            </div>
          )}
        </div>
      );

      return (
        <div onClick={e => { if (e.target === e.currentTarget) onClose(); }}
          style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200, padding: '1rem', backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)' }}>
          <div className="slide-up" style={{ background: 'var(--surface)', borderRadius: 'var(--r-lg)', width: '100%', maxWidth: 560, maxHeight: '85vh', display: 'flex', flexDirection: 'column', boxShadow: 'var(--shadow-lg), 0 0 0 1px var(--border)' }}>
            <div style={{ padding: '18px 22px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
              <div>
                <h2 style={{ fontFamily: 'var(--font-d)', fontSize: 22, fontWeight: 400, letterSpacing: '-0.01em' }}>User Management</h2>
                <p style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 3 }}>{users.length} account{users.length !== 1 ? 's' : ''} total</p>
              </div>
              <button onClick={onClose} className="btn-icon" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', padding: 6, borderRadius: 'var(--r)', transition: 'all 0.15s' }}><I.X /></button>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: '0 22px' }}>
              {loading
                ? <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '3rem', color: 'var(--text-3)' }}><I.Spin /></div>
                : <>
                    {pending.length > 0 && (
                      <div style={{ paddingTop: 16, paddingBottom: 8 }}>
                        <div style={{ fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--amber)', fontWeight: 700, marginBottom: 6, display: 'flex', alignItems: 'center', gap: 6 }}>
                          <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--amber)', display: 'inline-block' }} />
                          Pending Approval ({pending.length})
                        </div>
                        {pending.map(u => <UserRow key={u.id} u={u} />)}
                      </div>
                    )}
                    <div style={{ paddingTop: pending.length ? 12 : 16, paddingBottom: 8 }}>
                      <div style={{ fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-3)', fontWeight: 700, marginBottom: 6, display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent)', display: 'inline-block' }} />
                        Approved Users ({approved.length})
                      </div>
                      {approved.length === 0
                        ? <p style={{ fontSize: 13, color: 'var(--text-3)', padding: '8px 0' }}>No approved users yet.</p>
                        : approved.map(u => <UserRow key={u.id} u={u} />)
                      }
                    </div>
                  </>
              }
            </div>
            <div style={{ padding: '12px 22px', borderTop: '1px solid var(--border)', flexShrink: 0 }}>
              <Btn variant="ghost" size="sm" onClick={load} disabled={loading}>Refresh</Btn>
            </div>
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    //  POLICY COMPONENTS
    // ══════════════════════════════════════════════════════════════
    const Sidebar = ({ cats, sel, onSelect, loading }) => {
      const [openP, setOpenP] = useState({});
      const [openS, setOpenS] = useState({});

      const rowStyle = (active) => ({ width: '100%', textAlign: 'left', padding: '6px 10px 6px 12px', background: active ? 'var(--accent-muted)' : 'transparent', color: active ? 'var(--accent)' : 'var(--text-2)', border: 'none', cursor: 'pointer', fontSize: 12.5, fontWeight: active ? 700 : 400, borderRadius: 'var(--r)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 4, transition: 'all 0.12s', fontFamily: 'var(--font-u)' });
      const isP = (p) => sel.primary === p && !sel.secondary;
      const isS = (p, s) => sel.primary === p && sel.secondary === s && !sel.tertiary;
      const isT = (p, s, t) => sel.primary === p && sel.secondary === s && sel.tertiary === t;

      return (
        <aside style={{ width: 'var(--sidebar-w)', minWidth: 'var(--sidebar-w)', borderRight: '1px solid var(--border)', overflowY: 'auto', padding: '14px 8px 24px', display: 'flex', flexDirection: 'column', gap: 1 }}>
          <div style={{ fontSize: 9.5, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-3)', fontWeight: 700, padding: '2px 12px 10px', display: 'flex', alignItems: 'center', gap: 8 }}>
            <span>Series</span>
            <div style={{ flex: 1, height: 1, background: 'var(--border-2)' }} />
          </div>
          <button style={rowStyle(!sel.primary)} className="sidebar-row" onClick={() => onSelect({})}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 7 }}><I.File2 /> All Policies</span>
          </button>
          {loading
            ? <div style={{ padding: '12px 12px', color: 'var(--text-3)', fontSize: 12, display: 'flex', alignItems: 'center', gap: 6 }}><I.Spin /> Loading…</div>
            : cats.primaries.map(p => {
                const subs = cats.byPrimary[p] || [], pOpen = openP[p];
                return (
                  <div key={p}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 1 }}>
                      <button style={{ ...rowStyle(isP(p)), flex: 1 }} className="sidebar-row" onClick={() => { onSelect({ primary: p }); setOpenP(o => ({ ...o, [p]: true })); }}>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 7 }}><I.Folder /> {p}</span>
                      </button>
                      {subs.length > 0 && <button onClick={() => setOpenP(o => ({ ...o, [p]: !o[p] }))} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-3)', padding: '5px 6px', borderRadius: 'var(--r)', display: 'flex', transition: 'color 0.12s' }}>{pOpen ? <I.CDown /> : <I.CRight />}</button>}
                    </div>
                    {pOpen && subs.map(s => {
                      const sk = `${p}||${s}`, terts = cats.bySecondary[sk] || [], sOpen = openS[sk];
                      return (
                        <div key={s} style={{ marginLeft: 16, borderLeft: '1px solid var(--border)' }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 1, paddingLeft: 6 }}>
                            <button style={{ ...rowStyle(isS(p, s)), flex: 1, fontSize: 12 }} className="sidebar-row" onClick={() => { onSelect({ primary: p, secondary: s }); setOpenS(o => ({ ...o, [sk]: true })); }}>Series {s}</button>
                            {terts.length > 0 && <button onClick={() => setOpenS(o => ({ ...o, [sk]: !o[sk] }))} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-3)', padding: '5px 6px', borderRadius: 'var(--r)', display: 'flex' }}>{sOpen ? <I.CDown /> : <I.CRight />}</button>}
                          </div>
                          {sOpen && terts.map(t => <button key={t} style={{ ...rowStyle(isT(p, s, t)), width: 'calc(100% - 6px)', marginLeft: 6, fontSize: 11.5, paddingLeft: 10 }} className="sidebar-row" onClick={() => onSelect({ primary: p, secondary: s, tertiary: t })}>{t}</button>)}
                        </div>
                      );
                    })}
                  </div>
                );
              })
          }
        </aside>
      );
    };

    const PolicyList = ({ policies, selectedId, onSelect, loading, query }) => {
      const refs = useRef({});
      useEffect(() => { if (selectedId && refs.current[selectedId]) refs.current[selectedId].scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }, [selectedId]);
      if (loading) return <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-3)' }}><I.Spin /></div>;
      if (!policies.length) return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10, color: 'var(--text-3)', padding: '2rem' }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--surface-2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><I.File2 /></div>
          <span style={{ fontSize: 13, textAlign: 'center' }}>{query ? `No results for "${query}"` : 'No policies yet'}</span>
        </div>
      );
      return (
        <div style={{ flex: 1, overflowY: 'auto', padding: '6px 0' }}>
          {policies.map((p) => {
            const a = p.id === selectedId;
            return (
              <div key={p.id} ref={el => { refs.current[p.id] = el; }} onClick={() => onSelect(p, policies.indexOf(p))}
                className={!a ? 'policy-item' : ''}
                style={{ padding: '10px 16px', cursor: 'pointer', background: a ? 'var(--accent-muted)' : 'transparent', borderLeft: `2px solid ${a ? 'var(--accent)' : 'transparent'}`, transition: 'all 0.1s' }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: a ? 'var(--accent-text)' : 'var(--text)', marginBottom: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.name}</div>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 6 }}>
                  <div style={{ fontSize: 11, color: a ? 'var(--accent)' : 'var(--text-3)', display: 'flex', alignItems: 'center', gap: 3, minWidth: 0, opacity: a ? 0.85 : 1 }}>
                    {p.primary_category && (
                      <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {p.primary_category}{p.secondary_category ? ` Series ${p.secondary_category}` : ' Series'}
                      </span>
                    )}
                  </div>
                  <span style={{ fontSize: 10.5, color: 'var(--text-3)', flexShrink: 0, opacity: 0.75 }}>{fmtDate(p.updated_at)}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    const PolicyDetail = ({ policy, loading, onEdit, onNavigate }) => {
      const [refs, setRefs] = useState([]);
      const [refsLoading, setRefsLoading] = useState(false);

      useEffect(() => {
        if (!policy?.id) { setRefs([]); return; }
        setRefsLoading(true);
        apiGetReferences(policy.id).then(data => { setRefs(data); setRefsLoading(false); });
      }, [policy?.id]);

      if (loading) return <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><I.Spin /></div>;
      if (!policy) return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, color: 'var(--text-3)' }}>
          <div style={{ width: 60, height: 60, borderRadius: 16, background: 'var(--surface-2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <span style={{ fontSize: 13, fontWeight: 600 }}>Select a policy to read</span>
          <div style={{ fontSize: 12, display: 'flex', gap: 6, alignItems: 'center' }}><I.Kbd k="↑" /><I.Kbd k="↓" /><span style={{ color: 'var(--text-3)' }}>to navigate</span></div>
        </div>
      );
      return (
        <div className="fade-in" style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>
          <div style={{ padding: '10px 28px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'flex-end', flexShrink: 0, background: 'var(--surface)' }}>
            <Btn variant="default" size="sm" onClick={() => onEdit(policy)}><I.Edit /> Edit Policy</Btn>
          </div>
          <div style={{ flex: 1, overflowY: 'auto', padding: '3rem 3.5rem', maxWidth: 860 }}>

            {/* Policy Date — centre top */}
            {(() => { const m = parseContent(policy.content); return (
              <>
                <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                  {m.date && <p style={{ fontSize: 15, color: 'var(--text-3)', letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600 }}>Policy of {m.date}</p>}
                </div>

                {/* Roles left-aligned */}
                {m.roles && (
                  <div style={{ marginBottom: '1rem' }}>
                    {m.roles.split(',').map(r => r.trim()).filter(Boolean).map((r, i) => (
                      <p key={i} style={{ fontSize: 11.5, color: 'var(--text-2)', lineHeight: 2, letterSpacing: '0.01em' }}>{r}</p>
                    ))}
                  </div>
                )}

                {/* Series — centred, directly above title */}
                {(() => {
                  const seriesEntries = (m.series && m.series.length > 0)
                    ? m.series
                    : (policy.primary_category ? [{ name: policy.primary_category, number: policy.secondary_category || '' }] : []);
                  return seriesEntries.length > 0 ? (
                    <div style={{ textAlign: 'center', marginBottom: '1.25rem' }}>
                      {seriesEntries.map((s, i) => (
                        <p key={i} style={{ fontSize: 19.5, color: 'var(--text-2)', fontWeight: 500, letterSpacing: '0.02em', lineHeight: 2 }}>
                          {s.name} Series{s.number ? ` ${s.number}` : ''}
                        </p>
                      ))}
                    </div>
                  ) : null;
                })()}

                {/* Policy Title — large, centred */}
                <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 34, fontWeight: 500, lineHeight: 1.22, marginBottom: '2rem', letterSpacing: '-0.02em', textAlign: 'center' }}>{policy.name}</h1>

                {/* Referenced policies — centred, then shifted 30% towards left margin */}
                {refsLoading && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--text-3)', fontSize: 12, marginBottom: '1.5rem' }}><I.Spin /> Loading references…</div>
                )}
                {!refsLoading && refs.length > 0 && (
                  <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '2.5rem' }}>
                    <div style={{ transform: 'translateX(-30%)', display: 'inline-block' }}>
                      <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: '0.4rem' }}>Related Policies:</p>
                      {refs.map((ref) => {
                        const rm = parseContent(ref.content || '');
                        const seriesLabel = ref.primary_category
                          ? `${ref.primary_category} Series${ref.secondary_category ? ` ${ref.secondary_category}` : ''}`
                          : '';
                        return (
                          <div key={ref.id} style={{ display: 'grid', gridTemplateColumns: '110px 1fr', columnGap: '3rem', marginBottom: '0.15rem' }}>
                            {/* Row 1: date (right-aligned) | series */}
                            <span style={{ fontSize: 13, color: 'var(--text-2)', textAlign: 'right', lineHeight: 1.7 }}>{rm.date || ''}</span>
                            <span style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.7 }}>{seriesLabel}</span>
                            {/* Row 2: empty | policy name (clickable) */}
                            <span />
                            <button onClick={() => onNavigate && onNavigate(ref)}
                              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-2)', fontSize: 13, fontWeight: 400, textAlign: 'left', fontFamily: 'var(--font-u)', padding: 0, lineHeight: 1.7, marginBottom: '0.5rem' }}>
                              {ref.name}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Body — left aligned */}
                <div style={{ fontSize: 14.5, lineHeight: 1.95, color: 'var(--text)', whiteSpace: 'pre-wrap', wordBreak: 'break-word', fontWeight: 300, letterSpacing: '0.01em', marginBottom: '3rem' }}>{m.body}</div>

                {/* Author — right margin */}
                {(m.author_name || m.author_role) && (
                  <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '1rem', paddingTop: '1.5rem' }}>
                    <div style={{ textAlign: 'right' }}>
                      {m.author_name && <p style={{ fontSize: 14, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text)', lineHeight: 1.4 }}>{m.author_name}</p>}
                      {m.author_role && <p style={{ fontSize: 11.5, fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'var(--text-2)', marginTop: 3 }}>{m.author_role}</p>}
                    </div>
                  </div>
                )}
              </>
            ); })()}

          </div>
        </div>
      );
    };

    // ── Referenced Policies Editor ──────────────────────────────────
    const ReferencedPoliciesEditor = ({ currentPolicyId, value, onChange }) => {
      const [showSearch, setShowSearch] = useState(false);
      const [search, setSearch]         = useState('');
      const [results, setResults]       = useState([]);
      const [searching, setSearching]   = useState(false);
      const searchRef = useRef(null);

      const doSearch = useMemo(() => debounce(async (q) => {
        if (!q.trim()) { setResults([]); setSearching(false); return; }
        setSearching(true);
        const res = await apiSearch({ query: q });
        setResults(res.filter(p => p.id !== currentPolicyId && !value.find(v => v.id === p.id)));
        setSearching(false);
      }, 320), [currentPolicyId, value]);

      useEffect(() => { doSearch(search); }, [search]);

      const add = (p) => { onChange([...value, p]); setSearch(''); setResults([]); setShowSearch(false); };
      const remove = (id) => onChange(value.filter(p => p.id !== id));

      const openSearch = () => { setShowSearch(true); setTimeout(() => searchRef.current?.focus(), 40); };
      const cancelSearch = () => { setShowSearch(false); setSearch(''); setResults([]); };

      const lbl = { fontSize: 10, fontWeight: 700, color: 'var(--text-3)', marginBottom: 8, display: 'block', textTransform: 'uppercase', letterSpacing: '0.09em' };
      const inp = { width: '100%', padding: '9px 12px', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font-u)', fontSize: 13, outline: 'none', transition: 'border-color 0.15s, box-shadow 0.15s' };

      return (
        <div>
          <label style={lbl}>Referenced Policies</label>

          {/* List of added refs — styled like series entries */}
          {value.map((ref, idx) => (
            <div key={ref.id} style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 10, alignItems: 'center', marginBottom: 8 }}>
              <div style={{ padding: '9px 12px', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', background: 'var(--bg)', fontSize: 13, color: 'var(--text)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, minWidth: 0 }}>
                <span style={{ fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{ref.name}</span>
                {ref.primary_category && (
                  <span style={{ fontSize: 10.5, color: 'var(--text-3)', flexShrink: 0, background: 'var(--surface-3)', padding: '2px 7px', borderRadius: 100 }}>
                    {ref.primary_category}{ref.secondary_category ? ` ${ref.secondary_category}` : ''}
                  </span>
                )}
              </div>
              <button type="button" onClick={() => remove(ref.id)}
                style={{ background: 'transparent', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32, transition: 'all 0.15s', flexShrink: 0 }}
                onMouseEnter={e => { e.currentTarget.style.color = 'var(--danger)'; e.currentTarget.style.borderColor = 'var(--danger)'; }}
                onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                <I.X />
              </button>
            </div>
          ))}

          {/* Search input — shown when adding */}
          {(value.length === 0 || showSearch) && (
            <div style={{ position: 'relative', marginBottom: showSearch ? 0 : 0 }}>
              <div style={{ position: 'relative' }}>
                <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-3)', display: 'flex', pointerEvents: 'none' }}><I.Search /></span>
                <input ref={searchRef} className="form-input" value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Search for a policy to reference…"
                  style={{ ...inp, paddingLeft: 32 }} />
                {searching && <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', display: 'flex' }}><I.Spin /></span>}
                {showSearch && !searching && (
                  <button type="button" onClick={cancelSearch}
                    style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', padding: 2, borderRadius: 4 }}>
                    <I.X />
                  </button>
                )}
              </div>
              {results.length > 0 && (
                <div style={{ border: '1px solid var(--border)', borderRadius: 'var(--r)', marginTop: 5, background: 'var(--surface)', overflow: 'hidden', maxHeight: 190, overflowY: 'auto', boxShadow: 'var(--shadow-md)' }}>
                  {results.map((p, i) => (
                    <button key={p.id} type="button" onClick={() => add(p)} className="menu-item"
                      style={{ width: '100%', textAlign: 'left', padding: '9px 14px', background: 'transparent', border: 'none', borderBottom: i < results.length - 1 ? '1px solid var(--border)' : 'none', cursor: 'pointer', fontSize: 13, color: 'var(--text)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, fontFamily: 'var(--font-u)', transition: 'background 0.1s' }}>
                      <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: 500 }}>{p.name}</span>
                      <span style={{ fontSize: 10.5, color: 'var(--text-3)', flexShrink: 0 }}>{p.primary_category}{p.secondary_category ? ` ${p.secondary_category}` : ''}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Add another button — shown when refs exist and not searching */}
          {value.length > 0 && !showSearch && (
            <div style={{ marginTop: 4 }}>
              <button type="button" onClick={openSearch}
                style={{ background: 'transparent', border: '1px dashed var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 12px', fontSize: 12, fontFamily: 'var(--font-u)', transition: 'all 0.15s' }}
                onMouseEnter={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                <I.Plus /> Add another reference
              </button>
            </div>
          )}
        </div>
      );
    };

    const PolicyModal = ({ open, mode, editPolicy, cats, onSave, onClose }) => {
      const blank = { name: '', body: '', series_entries: [{ name: '', number: '' }], date: '', roles: '', author_name: '', author_role: '' };
      const [form, setForm] = useState(blank);
      const [refs, setRefs] = useState([]);
      const [saving, setSaving] = useState(false);
      const [err, setErr] = useState('');
      const nameRef = useRef(null);

      useEffect(() => {
        if (!open) return;
        if (mode === 'edit' && editPolicy) {
          const m = parseContent(editPolicy.content || '');
          const series_entries = (m.series && m.series.length > 0)
            ? m.series
            : [{ name: editPolicy.primary_category || '', number: editPolicy.secondary_category || '' }];
          setForm({
            name:         editPolicy.name || '',
            series_entries,
            date:         m.date || '',
            roles:        m.roles || '',
            author_name:  m.author_name || '',
            author_role:  m.author_role || '',
            body:         m.body || '',
          });
          apiGetReferences(editPolicy.id).then(setRefs);
        } else {
          setForm(blank);
          setRefs([]);
        }
        setErr(''); setSaving(false);
        setTimeout(() => nameRef.current?.focus(), 50);
      }, [open]);

      const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
      const save = async () => {
        if (!form.name.trim())                          { setErr('Policy title is required.'); return; }
        if (!form.series_entries[0]?.name?.trim())      { setErr('Series name is required.'); return; }
        if (!form.body.trim())                          { setErr('Policy content is required.'); return; }
        setSaving(true); setErr('');
        const dbForm = {
          name:               form.name.trim(),
          content:            serializeContent({ date: form.date, roles: form.roles, author_name: form.author_name, author_role: form.author_role, series: form.series_entries, body: form.body }),
          primary_category:   form.series_entries[0]?.name?.trim() || '',
          secondary_category: form.series_entries[0]?.number?.trim() || null,
          tertiary_category:  null,
        };
        const { data, error } = await apiSave(dbForm, mode === 'edit' ? editPolicy.id : null);
        if (error) { setErr(error.message); setSaving(false); return; }
        await apiSaveReferences(data.id, refs.map(r => r.id));
        setSaving(false);
        onSave(data);
      };

      if (!open) return null;
      const inp = { width: '100%', padding: '9px 12px', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font-u)', fontSize: 13, outline: 'none', transition: 'border-color 0.15s, box-shadow 0.15s' };
      const lbl = { fontSize: 10, fontWeight: 700, color: 'var(--text-3)', marginBottom: 6, display: 'block', textTransform: 'uppercase', letterSpacing: '0.09em' };
      const sectionDivider = (label) => (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 4 }}>
          <span style={{ fontSize: 9.5, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 700, color: 'var(--text-3)', whiteSpace: 'nowrap' }}>{label}</span>
          <div style={{ flex: 1, height: 1, background: 'var(--border-2)' }} />
        </div>
      );

      return (
        <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} onKeyDown={e => { if (e.key === 'Escape') onClose(); if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') save(); }}
          style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200, padding: '1rem', backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)' }}>
          <div className="slide-up" style={{ background: 'var(--surface)', borderRadius: 'var(--r-lg)', width: '100%', maxWidth: 700, maxHeight: '92vh', display: 'flex', flexDirection: 'column', boxShadow: 'var(--shadow-lg), 0 0 0 1px var(--border)' }}>
            <div style={{ padding: '16px 22px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
              <h2 style={{ fontFamily: 'var(--font-d)', fontSize: 24, fontWeight: 400, letterSpacing: '-0.015em' }}>{mode === 'add' ? 'New Policy' : 'Edit Policy'}</h2>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontSize: 11, color: 'var(--text-3)' }}><I.Kbd k="⌘↵" /> to save</span>
                <button onClick={onClose} className="btn-icon" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', padding: 6, borderRadius: 'var(--r)', transition: 'all 0.15s' }}><I.X /></button>
              </div>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: '22px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>

              {/* 1. Policy Date */}
              {sectionDivider('Policy Header')}
              <div>
                <label style={lbl}>Policy Date</label>
                <input className="form-input" style={inp} value={form.date} onChange={f('date')} placeholder="e.g. 10 May 26" />
              </div>

              {/* 2. Applicable Roles */}
              <div>
                <label style={lbl}>Applicable To</label>
                <input className="form-input" style={inp} value={form.roles} onChange={f('roles')} placeholder="e.g. Executives, Accountants, Legal Advisors" />
                <p style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 5 }}>Comma-separated list — displayed in the left margin</p>
              </div>

              {/* 3. Series */}
              {sectionDivider('Series')}
              {form.series_entries.map((entry, idx) => (
                <div key={idx} style={{ display: 'grid', gridTemplateColumns: '2fr 1fr auto', gap: 10, alignItems: 'flex-end' }}>
                  <div>
                    {idx === 0 && <label style={lbl}>Series Name *</label>}
                    <input className="form-input" style={inp} list="pv-series" value={entry.name}
                      onChange={e => setForm(p => { const s = [...p.series_entries]; s[idx] = { ...s[idx], name: e.target.value }; return { ...p, series_entries: s }; })}
                      placeholder="e.g. Finance" />
                    <datalist id="pv-series">{cats.primaries.map(c => <option key={c} value={c} />)}</datalist>
                  </div>
                  <div>
                    {idx === 0 && <label style={lbl}>Series Number</label>}
                    <input className="form-input" style={inp} value={entry.number}
                      onChange={e => setForm(p => { const s = [...p.series_entries]; s[idx] = { ...s[idx], number: e.target.value }; return { ...p, series_entries: s }; })}
                      placeholder="e.g. 6" />
                  </div>
                  <div style={{ paddingBottom: 1 }}>
                    {form.series_entries.length > 1 && (
                      <button type="button" onClick={() => setForm(p => ({ ...p, series_entries: p.series_entries.filter((_, i) => i !== idx) }))}
                        style={{ background: 'transparent', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32, transition: 'all 0.15s' }}
                        onMouseEnter={e => { e.currentTarget.style.color = 'var(--danger)'; e.currentTarget.style.borderColor = 'var(--danger)'; }}
                        onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                        <I.X />
                      </button>
                    )}
                  </div>
                </div>
              ))}
              <div>
                <button type="button" onClick={() => setForm(p => ({ ...p, series_entries: [...p.series_entries, { name: '', number: '' }] }))}
                  style={{ background: 'transparent', border: '1px dashed var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 12px', fontSize: 12, fontFamily: 'var(--font-u)', transition: 'all 0.15s' }}
                  onMouseEnter={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                  onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                  <I.Plus /> Add another series
                </button>
              </div>

              {/* 4. Policy Title */}
              {sectionDivider('Policy Title')}
              <div>
                <label style={lbl}>Title *</label>
                <input ref={nameRef} className="form-input" style={{ ...inp, fontSize: 15, fontFamily: 'var(--font-d)', fontWeight: 500 }} value={form.name} onChange={f('name')} placeholder="e.g. Central Centralise Oversight with an Asset Control Ledger" />
              </div>

              {/* 5. Referenced Policies */}
              {sectionDivider('Referenced Policies')}
              <ReferencedPoliciesEditor
                currentPolicyId={mode === 'edit' ? editPolicy?.id : null}
                value={refs}
                onChange={setRefs}
              />

              {/* 6. Policy Body */}
              {sectionDivider('Policy Content')}
              <div>
                <label style={lbl}>Body *</label>
                <textarea className="form-input" style={{ ...inp, minHeight: 220, resize: 'vertical', lineHeight: 1.8, fontWeight: 300 }} value={form.body} onChange={f('body')} placeholder="Enter the full policy text…" />
              </div>

              {/* 7. Author */}
              {sectionDivider('Author')}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
                <div>
                  <label style={lbl}>Author Name</label>
                  <input className="form-input" style={{ ...inp, textTransform: 'uppercase' }} value={form.author_name} onChange={f('author_name')} placeholder="e.g. JOHN SMITH" />
                </div>
                <div>
                  <label style={lbl}>Author Role</label>
                  <input className="form-input" style={{ ...inp, textTransform: 'uppercase' }} value={form.author_role} onChange={f('author_role')} placeholder="e.g. CHIEF EXECUTIVE OFFICER" />
                </div>
              </div>
              <p style={{ fontSize: 11, color: 'var(--text-3)', marginTop: -8 }}>Displayed in capitals at the end of the policy, right-aligned</p>

              {err && <div style={{ fontSize: 13, color: 'var(--danger)', background: 'var(--danger-bg)', padding: '9px 13px', borderRadius: 'var(--r)', borderLeft: '3px solid var(--danger)' }}>{err}</div>}
            </div>
            <div style={{ padding: '14px 22px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'flex-end', gap: 8, flexShrink: 0 }}>
              <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
              <Btn variant="primary" onClick={save} disabled={saving}>{saving ? 'Saving…' : mode === 'add' ? 'Create Policy' : 'Save Changes'}</Btn>
            </div>
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    //  SETUP SCREEN
    // ══════════════════════════════════════════════════════════════
    const SetupScreen = () => {
      const urlVal = SUPABASE_URL;
      const keyVal = SUPABASE_ANON_KEY;
      const urlOk  = urlVal !== '__SUPABASE_URL__' && urlVal.length > 10;
      const keyOk  = keyVal !== '__SUPABASE_ANON_KEY__' && keyVal.length > 10;
      const diagStyle = { fontSize: 12, fontFamily: 'monospace', padding: '10px 14px', borderRadius: 'var(--r)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 10 };
      return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
        <div style={{ maxWidth: 520, width: '100%' }}>
          <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 50, fontWeight: 300, marginBottom: 10, letterSpacing: '-0.03em' }}>PolicyVault</h1>
          <p style={{ color: 'var(--text-2)', marginBottom: 28, lineHeight: 1.7 }}>Set <code style={{ background: 'var(--surface-2)', padding: '2px 6px', borderRadius: 5, fontSize: 12, fontWeight: 700 }}>SUPABASE_URL</code> and <code style={{ background: 'var(--surface-2)', padding: '2px 6px', borderRadius: 5, fontSize: 12, fontWeight: 700 }}>SUPABASE_ANON_KEY</code> as Netlify environment variables, then trigger a redeploy.</p>

          <div style={{ marginBottom: 20, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', padding: '14px 16px' }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-3)', marginBottom: 10 }}>🔍 Diagnostics</div>
            <div style={{ ...diagStyle, background: urlOk ? 'var(--accent-bg)' : 'var(--danger-bg)', color: urlOk ? 'var(--accent)' : 'var(--danger)' }}>
              <span>{urlOk ? '✓' : '✗'}</span>
              <span>SUPABASE_URL: {urlOk ? urlVal.slice(0, 30) + '…' : `"${urlVal}" (not substituted)`}</span>
            </div>
            <div style={{ ...diagStyle, background: keyOk ? 'var(--accent-bg)' : 'var(--danger-bg)', color: keyOk ? 'var(--accent)' : 'var(--danger)' }}>
              <span>{keyOk ? '✓' : '✗'}</span>
              <span>SUPABASE_ANON_KEY: {keyOk ? keyVal.slice(0, 20) + '…' : `"${keyVal}" (not substituted)`}</span>
            </div>
            {urlOk && keyOk && (
              <div style={{ fontSize: 12, color: 'var(--amber)', marginTop: 6 }}>
                ⚠ Credentials look substituted — hard-refresh the page (Ctrl+Shift+R / Cmd+Shift+R) or clear cache and try again.
              </div>
            )}
          </div>

          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', overflow: 'hidden', boxShadow: 'var(--shadow-sm)' }}>
            {[
              ['Create Supabase project', 'supabase.com → New project (free tier)'],
              ['Run both SQL files', 'SQL Editor: schema.sql then auth-schema.sql'],
              ['Add env vars in Netlify', 'Site → Site configuration → Environment variables'],
              ['Trigger a redeploy', 'Deploys → Trigger deploy → Deploy site'],
              ['Bootstrap first admin', 'Run the UPDATE query at the bottom of auth-schema.sql'],
            ].map(([t, d], i, arr) => (
              <div key={i} style={{ display: 'flex', gap: 14, padding: '14px 20px', borderBottom: i < arr.length - 1 ? '1px solid var(--border)' : 'none', alignItems: 'flex-start' }}>
                <span style={{ minWidth: 24, height: 24, borderRadius: '50%', background: 'var(--accent-bg)', color: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0, marginTop: 1, border: '1px solid rgba(27,82,68,0.15)' }}>{i + 1}</span>
                <div><div style={{ fontSize: 13, fontWeight: 600, marginBottom: 3 }}>{t}</div><div style={{ fontSize: 12, color: 'var(--text-3)', lineHeight: 1.55 }}>{d}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    //  ROOT APP
    // ══════════════════════════════════════════════════════════════
    function App() {
      const [authState, setAuthState]         = useState('loading');
      const [user, setUser]                   = useState(null);
      const [profile, setProfile]             = useState(null);
      const [dark, setDark]                   = useState(() => {
        const s = localStorage.getItem('pv-dark');
        return s !== null ? s === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      });
      const [cats, setCats]                   = useState({ primaries: [], byPrimary: {}, bySecondary: {} });
      const [catsLoading, setCatsLoading]     = useState(false);
      const [policies, setPolicies]           = useState([]);
      const [listLoading, setListLoading]     = useState(false);
      const [query, setQuery]                 = useState('');
      const [sel, setSel]                     = useState({});
      const [activePolicy, setActivePolicy]   = useState(null);
      const [activeId, setActiveId]           = useState(null);
      const [activeIdx, setActiveIdx]         = useState(-1);
      const [detailLoading, setDetailLoading] = useState(false);
      const [policyModal, setPolicyModal]     = useState({ open: false, mode: 'add' });
      const [usersModal, setUsersModal]       = useState(false);
      const [userMenu, setUserMenu]           = useState(false);
      const searchRef   = useRef(null);
      const userMenuRef = useRef(null);

      useEffect(() => { document.documentElement.setAttribute('data-dark', String(dark)); localStorage.setItem('pv-dark', dark); }, [dark]);

      useEffect(() => {
        if (!configured) { setAuthState('unauthenticated'); return; }
        const clearBadSession = async () => {
          try { await db.auth.signOut(); } catch(e) {}
          localStorage.clear(); sessionStorage.clear();
          setUser(null); setProfile(null); setAuthState('unauthenticated');
        };
        const timeout = setTimeout(() => { setAuthState(s => { if (s === 'loading') { clearBadSession(); } return s; }); }, 6000);
        const resolve = async (session) => {
          try {
            if (!session) { setUser(null); setProfile(null); setAuthState('unauthenticated'); return; }
            setUser(session.user);
            const { data: p, error } = await db.from('user_profiles').select('*').eq('id', session.user.id).single();
            if (error) { console.warn('PolicyVault: profile error, clearing session:', error.message); await clearBadSession(); return; }
            setProfile(p);
            setAuthState(p?.approved ? 'authenticated' : 'pending');
          } catch (err) { console.warn('PolicyVault auth error:', err); await clearBadSession(); }
        };
        db.auth.getSession().then(({ data: { session }, error }) => {
          if (error) { console.warn('PolicyVault: bad session, clearing:', error.message); clearBadSession(); }
          else { resolve(session); }
        });
        const { data: { subscription } } = db.auth.onAuthStateChange((event, session) => {
          if (['SIGNED_IN','SIGNED_OUT','TOKEN_REFRESHED','INITIAL_SESSION','USER_UPDATED'].includes(event)) resolve(session);
        });
        return () => { subscription.unsubscribe(); clearTimeout(timeout); };
      }, []);

      useEffect(() => {
        const h = e => { if (userMenuRef.current && !userMenuRef.current.contains(e.target)) setUserMenu(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, []);

      const loadCats = useCallback(async () => { setCatsLoading(true); setCats(await apiGetCats()); setCatsLoading(false); }, []);
      useEffect(() => { if (authState === 'authenticated') loadCats(); }, [authState]);
