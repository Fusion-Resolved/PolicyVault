          <div className="slide-up" style={{ background: 'var(--surface)', borderRadius: 'var(--r-lg)', width: '100%', maxWidth: 560, maxHeight: '88vh', display: 'flex', flexDirection: 'column', boxShadow: 'var(--shadow-lg), 0 0 0 1px var(--border)' }}>

            {/* Header */}
            <div style={{ padding: '18px 22px 0', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                <h2 style={{ fontFamily: 'var(--font-d)', fontSize: 24, fontWeight: 400, letterSpacing: '-0.015em' }}>Settings</h2>
                <button onClick={onClose} className="btn-icon" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', padding: 6, borderRadius: 'var(--r)', transition: 'all 0.15s' }}><I.X /></button>
              </div>
              {/* Tab bar */}
              <div style={{ display: 'flex', gap: 2, background: 'var(--surface-2)', borderRadius: 'calc(var(--r) + 2px)', padding: 3, width: 'fit-content' }}>
                {TABS.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    className={`settings-tab${tab === t.id ? ' active' : ''}`}
                    style={{ padding: '6px 16px', fontSize: 12.5, fontWeight: 700, border: 'none', borderRadius: 'var(--r)', cursor: 'pointer', fontFamily: 'var(--font-u)', background: tab === t.id ? 'var(--surface)' : 'transparent', color: tab === t.id ? 'var(--text)' : 'var(--text-3)', letterSpacing: '0.01em' }}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Tab: Appearance */}
            {tab === 'appearance' && (
              <div style={{ flex: 1, overflowY: 'auto', padding: '22px 22px', display: 'flex', flexDirection: 'column', gap: 24 }}>

                {/* Dark / Light mode */}
                <div>
                  <label style={lbl}>Colour Scheme</label>
                  <div style={{ display: 'flex', gap: 8 }}>
                    {[{ val: false, icon: '☀', label: 'Light' }, { val: true, icon: '🌙', label: 'Dark' }].map(opt => (
                      <button key={opt.label} type="button" onClick={() => { if (dark !== opt.val) onToggleDark(); }}
                        style={{ flex: 1, padding: '10px 14px', border: `1.5px solid ${dark === opt.val ? 'var(--accent)' : 'var(--border-2)'}`, borderRadius: 'var(--r)', background: dark === opt.val ? 'var(--accent-muted)' : 'var(--bg)', color: dark === opt.val ? 'var(--accent)' : 'var(--text-2)', cursor: 'pointer', fontFamily: 'var(--font-u)', fontSize: 13, fontWeight: dark === opt.val ? 700 : 400, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, transition: 'all 0.15s' }}>
                        <span style={{ fontSize: 16 }}>{opt.icon}</span> {opt.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Policy font family */}
                <div>
                  <label style={lbl}>Policy Font</label>
                  <p style={{ fontSize: 12, color: 'var(--text-3)', marginBottom: 10, lineHeight: 1.55 }}>Applied to all policy document text — title, body, and references.</p>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {fontOptions.map(opt => (
                      <button key={opt.value} type="button" onClick={() => setPolicyFont(opt.value)}
                        style={{ padding: '12px 14px', border: `1.5px solid ${policyFont === opt.value ? 'var(--accent)' : 'var(--border-2)'}`, borderRadius: 'var(--r)', background: policyFont === opt.value ? 'var(--accent-muted)' : 'var(--bg)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between', transition: 'all 0.15s', textAlign: 'left' }}>
                        <span style={{ fontFamily: opt.preview, fontSize: 18, color: policyFont === opt.value ? 'var(--accent-text)' : 'var(--text)', fontWeight: policyFont === opt.value ? 600 : 400 }}>{opt.label}</span>
                        {policyFont === opt.value && <I.Check />}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Font size */}
                <div>
                  <label style={lbl}>Policy Font Size — {fontSize}px</label>
                  <input type="range" min="12" max="20" step="0.5" value={fontSize}
                    onChange={e => setFontSize(e.target.value)}
                    style={{ width: '100%', accentColor: 'var(--accent)', cursor: 'pointer' }} />
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--text-3)', marginTop: 4 }}>
                    <span>12px — Compact</span><span>16px — Default</span><span>20px — Large</span>
                  </div>
                </div>

                {/* Font colour */}
                <div>
                  <label style={lbl}>Policy Text Colour</label>
                  <p style={{ fontSize: 12, color: 'var(--text-3)', marginBottom: 10, lineHeight: 1.55 }}>Override the body text colour in policy documents.</p>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 10 }}>
                    {presetColors.map(c => (
                      <button key={c.value} type="button" title={c.label} onClick={() => setFontColor(c.value)}
                        style={{ width: 32, height: 32, borderRadius: 'var(--r)', border: `2px solid ${fontColor === c.value ? 'var(--accent)' : 'var(--border-2)'}`, background: c.value || 'var(--text)', cursor: 'pointer', position: 'relative', transition: 'border-color 0.15s', overflow: 'hidden', flexShrink: 0 }}>
                        {c.value === '' && <span style={{ fontFamily: 'var(--font-u)', fontSize: 10, fontWeight: 700, color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.4)' }}>A</span>}
                        {fontColor === c.value && c.value !== '' && <span style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><I.Check /></span>}
                      </button>
                    ))}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <input type="color" value={fontColor || '#18170F'} onChange={e => setFontColor(e.target.value)}
                        title="Custom colour"
                        style={{ width: 32, height: 32, border: '1.5px solid var(--border-2)', borderRadius: 'var(--r)', background: 'transparent', cursor: 'pointer', padding: 2 }} />
                      <span style={{ fontSize: 11, color: 'var(--text-3)' }}>Custom</span>
                    </div>
                  </div>
                  {fontColor && (
                    <button type="button" onClick={() => setFontColor('')}
                      style={{ fontSize: 11, color: 'var(--text-3)', background: 'transparent', border: 'none', cursor: 'pointer', padding: 0, textDecoration: 'underline', fontFamily: 'var(--font-u)' }}>
                      Reset to default
                    </button>
                  )}
                </div>

                {/* Live preview */}
                <div>
                  <label style={lbl}>Preview</label>
                  <div style={{ border: '1px solid var(--border-2)', borderRadius: 'var(--r)', padding: '16px 20px', background: 'var(--bg)' }}>
                    <p style={{ fontFamily: fontOptions.find(f => f.value === policyFont)?.preview, fontSize: parseFloat(fontSize), color: fontColor || 'var(--text)', lineHeight: 1.8, fontWeight: 300 }}>
                      This is how your policy body text will appear. Clear, consistent, and readable across all documents.
                    </p>
                  </div>
                </div>
              </div>
            )}

            {/* Tab: Documents */}
            {tab === 'documents' && (
              <div style={{ flex: 1, overflowY: 'auto', padding: '22px 22px', display: 'flex', flexDirection: 'column', gap: 16 }}>
                <div>
                  <label style={lbl}>Document Types</label>
                  <p style={{ fontSize: 12, color: 'var(--text-3)', marginBottom: 12, lineHeight: 1.6 }}>
                    Each option appears before "of [date]" in the policy header — e.g. "Policy" displays as "Policy of 10 June 2026".
                  </p>
                  {prefixes.map((p, i) => (
                    <div key={i} style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8, marginBottom: 8, alignItems: 'center' }}>
                      <input className="form-input" style={inp} value={p}
                        onChange={e => { const next = [...prefixes]; next[i] = e.target.value; setPrefixes(next); }}
                        placeholder="e.g. Policy" />
                      <button type="button" onClick={() => setPrefixes(prefixes.filter((_, j) => j !== i))}
                        style={{ background: 'transparent', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32, transition: 'all 0.15s', flexShrink: 0 }}
                        onMouseEnter={e => { e.currentTarget.style.color = 'var(--danger)'; e.currentTarget.style.borderColor = 'var(--danger)'; }}
                        onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                        <I.X />
                      </button>
                    </div>
                  ))}
                  <button type="button" onClick={() => setPrefixes([...prefixes, ''])}
                    style={{ background: 'transparent', border: '1px dashed var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 12px', fontSize: 12, fontFamily: 'var(--font-u)', marginTop: 4, transition: 'all 0.15s' }}
                    onMouseEnter={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                    onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                    <I.Plus /> Add document type
                  </button>
                </div>
              </div>
            )}

            {/* Tab: Account */}
            {tab === 'account' && (
              <div style={{ flex: 1, overflowY: 'auto', padding: '22px 22px', display: 'flex', flexDirection: 'column', gap: 24 }}>

                {/* Account info */}
                <div style={{ background: 'var(--surface-2)', borderRadius: 'var(--r)', padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 14 }}>
                  <div style={{ width: 42, height: 42, borderRadius: '50%', background: isAdmin ? 'var(--accent-bg)' : 'var(--surface-3)', border: `1.5px solid ${isAdmin ? 'var(--accent)' : 'var(--border-2)'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: isAdmin ? 'var(--accent)' : 'var(--text-2)', flexShrink: 0 }}>
                    {(profile?.email || '?')[0].toUpperCase()}
                  </div>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{profile?.email}</div>
                    <div style={{ fontSize: 11, color: isAdmin ? 'var(--accent)' : 'var(--text-3)', marginTop: 2, fontWeight: isAdmin ? 700 : 400, display: 'flex', alignItems: 'center', gap: 4 }}>
                      {isAdmin ? <><I.Shield /> Administrator</> : <span>Standard User</span>}
                    </div>
                  </div>
                </div>

                {/* Change password */}
                <div>
                  <label style={lbl}>Change Password</label>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                    <input className="form-input" style={inp} type="password" placeholder="New password (min. 8 chars)" value={pwForm.next}
                      onChange={e => setPwForm(p => ({ ...p, next: e.target.value }))} />
                    <input className="form-input" style={inp} type="password" placeholder="Confirm new password" value={pwForm.confirm}
                      onChange={e => setPwForm(p => ({ ...p, confirm: e.target.value }))} />
                    {pwMsg.text && (
                      <div style={{ fontSize: 12.5, color: pwMsg.ok ? 'var(--accent)' : 'var(--danger)', background: pwMsg.ok ? 'var(--accent-bg)' : 'var(--danger-bg)', padding: '8px 12px', borderRadius: 'var(--r)', borderLeft: `3px solid ${pwMsg.ok ? 'var(--accent)' : 'var(--danger)'}` }}>
                        {pwMsg.text}
                      </div>
                    )}
                    <Btn variant="default" onClick={handlePwChange} disabled={pwLoading} full>
                      {pwLoading ? <><I.Spin /> Updating…</> : 'Update Password'}
                    </Btn>
                  </div>
                </div>

                {/* Admin: manage users */}
                {isAdmin && (
                  <div style={{ borderTop: '1px solid var(--border)', paddingTop: 20 }}>
                    <label style={lbl}>Administration</label>
                    <button type="button" onClick={onManageUsers}
                      style={{ width: '100%', padding: '11px 14px', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', background: 'var(--bg)', color: 'var(--text)', cursor: 'pointer', fontFamily: 'var(--font-u)', fontSize: 13, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 9, transition: 'background 0.15s', textAlign: 'left' }}
                      className="menu-item">
                      <I.Users /> Manage Users &amp; Approvals
                      <span style={{ marginLeft: 'auto', color: 'var(--text-3)', fontSize: 11 }}>→</span>
                    </button>
                  </div>
                )}

                {/* Sign out */}
                <div style={{ borderTop: '1px solid var(--border)', paddingTop: 20, marginTop: 'auto' }}>
                  <label style={lbl}>Session</label>
                  <Btn variant="danger" full onClick={() => { onClose(); onSignOut(); }}>
                    <I.LogOut /> Sign Out
                  </Btn>
                </div>
              </div>
            )}

            {/* Footer actions */}
            <div style={{ padding: '14px 22px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'flex-end', gap: 8, flexShrink: 0 }}>
              <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
              <Btn variant="primary" onClick={save}>Save Settings</Btn>
            </div>
          </div>
        </div>
      );
    };

    const PolicyModal = ({ open, mode, editPolicy, cats, settings, onSave, onClose }) => {
      const blank = { name: '', body: '', series_entries: [{ name: '', number: '' }], date: '', issue: 0, doc_prefix: '', roles: '', author_name: '', author_role: '' };
      const [form, setForm]         = useState(blank);
      const [refs, setRefs]         = useState([]);
      const [refTypes, setRefTypes] = useState({});
      const [showIssue, setShowIssue] = useState(false);
      const [issueInput, setIssueInput] = useState('');
      const [saving, setSaving]     = useState(false);
      const [err, setErr]           = useState('');
      const [sDragIdx, setSDragIdx] = useState(null);
      const [sDragOver, setSDragOver] = useState(null);
      const nameRef = useRef(null);

      useEffect(() => {
        if (!open) return;
        if (mode === 'edit' && editPolicy) {
          const m = parseContent(editPolicy.content || '');
          const series_entries = (m.series && m.series.length > 0)
            ? m.series
            : [{ name: editPolicy.primary_category || '', number: editPolicy.secondary_category || '' }];
          setForm({
            name:         editPolicy.name || '',
            series_entries,
            date:         toISODate(m.date) || '',
            issue:        m.issue || 0,
            doc_prefix:   m.doc_prefix || '',
            roles:        m.roles || '',
            author_name:  m.author_name || '',
            author_role:  m.author_role || '',
            body:         m.body || '',
          });
          setRefTypes(m.ref_types || {});
          if (m.issue > 0) { setShowIssue(true); setIssueInput(String(m.issue)); }
          else { setShowIssue(false); setIssueInput(''); }
          apiGetReferences(editPolicy.id).then(setRefs);
        } else {
          setForm(blank);
          setRefs([]);
          setRefTypes({});
          setShowIssue(false);
          setIssueInput('');
        }
        setErr(''); setSaving(false);
        setTimeout(() => nameRef.current?.focus(), 50);
      }, [open]);

      const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

      const save = async () => {
        if (!form.name.trim())                          { setErr('Policy title is required.'); return; }
        if (!form.series_entries[0]?.name?.trim())      { setErr('Series name is required.'); return; }
        if (!form.body.trim())                          { setErr('Policy content is required.'); return; }
        setSaving(true); setErr('');

        const issueNum = showIssue && issueInput ? parseInt(issueInput, 10) || 0 : form.issue || 0;

        // Auto-issue: for new policies, check for same-date siblings and assign issue numbers
        let finalIssue = issueNum;
        if (mode === 'add' && form.date.trim() && !showIssue) {
          const { data: allPolicies } = await db.from('policies').select('id, content');
          const same = (allPolicies || []).filter(p => {
            const pm = parseContent(p.content || '');
            return pm.date?.trim() === form.date.trim();
          });
          if (same.length > 0) {
            let nextIssue = 1;
            for (const p of same) {
              const pm = parseContent(p.content || '');
              if (pm.issue > 0) {
                nextIssue = Math.max(nextIssue, pm.issue + 1);
              } else {
                await db.from('policies').update({ content: serializeContent({ ...pm, issue: 1 }) }).eq('id', p.id);
                nextIssue = Math.max(nextIssue, 2);
              }
            }
            finalIssue = nextIssue;
          }
        }

        const dbForm = {
          name:               form.name.trim(),
          content:            serializeContent({ date: form.date, issue: finalIssue, doc_prefix: form.doc_prefix, roles: form.roles, author_name: form.author_name, author_role: form.author_role, series: form.series_entries, ref_types: refTypes, body: form.body }),
          primary_category:   form.series_entries[0]?.name?.trim() || '',
          secondary_category: form.series_entries[0]?.number?.trim() || null,
          tertiary_category:  null,
        };
        const { data, error } = await apiSave(dbForm, mode === 'edit' ? editPolicy.id : null);
        if (error) { setErr(error.message); setSaving(false); return; }
        await apiSaveReferences(data.id, refs.map(r => r.id));
        setSaving(false);
        onSave(data);
      };

      if (!open) return null;
      const inp = { width: '100%', padding: '9px 12px', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font-u)', fontSize: 13, outline: 'none', transition: 'border-color 0.15s, box-shadow 0.15s' };
      const lbl = { fontSize: 10, fontWeight: 700, color: 'var(--text-3)', marginBottom: 6, display: 'block', textTransform: 'uppercase', letterSpacing: '0.09em' };
      const sectionDivider = (label) => (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 4 }}>
          <span style={{ fontSize: 9.5, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 700, color: 'var(--text-3)', whiteSpace: 'nowrap' }}>{label}</span>
          <div style={{ flex: 1, height: 1, background: 'var(--border-2)' }} />
        </div>
      );

      return (
        <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} onKeyDown={e => { if (e.key === 'Escape') onClose(); if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') save(); }}
          style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200, padding: '1rem', backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)' }}>
          <div className="slide-up" style={{ background: 'var(--surface)', borderRadius: 'var(--r-lg)', width: '100%', maxWidth: 700, maxHeight: '92vh', display: 'flex', flexDirection: 'column', boxShadow: 'var(--shadow-lg), 0 0 0 1px var(--border)' }}>
            <div style={{ padding: '16px 22px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
              <h2 style={{ fontFamily: 'var(--font-d)', fontSize: 24, fontWeight: 400, letterSpacing: '-0.015em' }}>{mode === 'add' ? 'New Policy' : 'Edit Policy'}</h2>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontSize: 11, color: 'var(--text-3)' }}><I.Kbd k="⌘↵" /> to save</span>
                <button onClick={onClose} className="btn-icon" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', padding: 6, borderRadius: 'var(--r)', transition: 'all 0.15s' }}><I.X /></button>
              </div>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: '22px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>

              {/* 1. Policy Date + Document Type + Issue */}
              {sectionDivider('Policy Header')}
              <div>
                <label style={lbl}>Policy Date</label>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  {/* Document type dropdown */}
                  {(settings?.documentPrefixes?.length > 1) ? (
                    <select className="form-input"
                      style={{ padding: '9px 12px', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font-u)', fontSize: 13, outline: 'none', cursor: 'pointer', flexShrink: 0, transition: 'border-color 0.15s, box-shadow 0.15s' }}
                      value={form.doc_prefix}
                      onChange={e => setForm(p => ({ ...p, doc_prefix: e.target.value }))}>
                      {settings.documentPrefixes.map(pf => (
                        <option key={pf} value={pf}>{stripOf(pf)}</option>
                      ))}
                    </select>
                  ) : (
                    <span style={{ fontSize: 13, color: 'var(--text-2)', fontWeight: 500, flexShrink: 0, whiteSpace: 'nowrap' }}>
                      {stripOf(settings?.documentPrefixes?.[0] || 'Policy')}
                    </span>
                  )}
                  {/* Plain "of" separator */}
                  <span style={{ fontSize: 13, color: 'var(--text-3)', flexShrink: 0 }}>of</span>
                  {/* Date input + Today button */}
                  <div style={{ position: 'relative', display: 'flex', alignItems: 'center', flex: 1 }}>
                    <input className="form-input"
                      type="date"
                      style={{ width: '100%', padding: '9px 12px', paddingRight: 70, border: '1px solid var(--border-2)', borderRadius: 'var(--r)', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font-u)', fontSize: 13, outline: 'none', transition: 'border-color 0.15s, box-shadow 0.15s' }}
                      value={form.date}
                      onChange={e => setForm(p => ({ ...p, date: e.target.value }))} />
                    <button type="button"
                      onClick={() => setForm(p => ({ ...p, date: new Date().toISOString().split('T')[0] }))}
                      style={{ position: 'absolute', right: 8, background: 'var(--surface-2)', border: '1px solid var(--border-2)', borderRadius: 'calc(var(--r) - 2px)', cursor: 'pointer', color: 'var(--text-2)', fontSize: 10.5, fontWeight: 600, fontFamily: 'var(--font-u)', padding: '3px 7px', whiteSpace: 'nowrap', transition: 'all 0.15s', letterSpacing: '0.02em' }}
                      onMouseEnter={e => { e.currentTarget.style.background = 'var(--accent-muted)'; e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                      onMouseLeave={e => { e.currentTarget.style.background = 'var(--surface-2)'; e.currentTarget.style.color = 'var(--text-2)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                      Today
                    </button>
                  </div>
                </div>
              </div>
              {showIssue ? (
                <div>
                  <label style={lbl}>Issue Number</label>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <input className="form-input" style={{ ...inp, width: 120 }} type="number" min="1" value={issueInput}
                      onChange={e => { setIssueInput(e.target.value); setForm(p => ({ ...p, issue: parseInt(e.target.value, 10) || 0 })); }}
                      placeholder="e.g. 5" />
                    {issueInput && parseInt(issueInput, 10) > 0 && (
                      <span style={{ fontSize: 14, color: 'var(--text-2)', fontWeight: 500 }}>→ Issue {toRoman(parseInt(issueInput, 10))}</span>
                    )}
                    <button type="button" onClick={() => { setShowIssue(false); setIssueInput(''); setForm(p => ({ ...p, issue: 0 })); }}
                      style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', padding: 4 }}>
                      <I.X />
                    </button>
                  </div>
                  <p style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 5 }}>Displayed as "Issue {issueInput && parseInt(issueInput) > 0 ? toRoman(parseInt(issueInput)) : 'I'}" beneath the date</p>
                </div>
              ) : (
                <div>
                  <button type="button" onClick={() => { setShowIssue(true); setTimeout(() => {}, 40); }}
                    style={{ background: 'transparent', border: '1px dashed var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 12px', fontSize: 12, fontFamily: 'var(--font-u)', transition: 'all 0.15s' }}
                    onMouseEnter={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                    onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                    <I.Plus /> Add Issue Number
                  </button>
                </div>
              )}

              {/* 2. Applicable Roles */}
              <div>
                <label style={lbl}>Applicable To</label>
                <input className="form-input" style={inp} value={form.roles} onChange={f('roles')} placeholder="e.g. Executives, Accountants, Legal Advisors" />
                <p style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 5 }}>Comma-separated list — displayed in the left margin</p>
              </div>

              {/* 3. Series — drag to reorder */}
              {sectionDivider('Series')}
              {form.series_entries.map((entry, idx) => (
                <div key={idx}
                  draggable
                  onDragStart={e => { setSDragIdx(idx); e.dataTransfer.effectAllowed = 'move'; }}
                  onDragOver={e => { e.preventDefault(); setSDragOver(idx); }}
                  onDrop={e => {
                    e.preventDefault();
                    if (sDragIdx === null || sDragIdx === idx) { setSDragIdx(null); setSDragOver(null); return; }
                    const next = [...form.series_entries];
                    const [item] = next.splice(sDragIdx, 1);
                    next.splice(idx, 0, item);
                    setForm(p => ({ ...p, series_entries: next }));
                    setSDragIdx(null); setSDragOver(null);
                  }}
                  onDragEnd={() => { setSDragIdx(null); setSDragOver(null); }}
                  style={{ display: 'grid', gridTemplateColumns: 'auto 2fr 1fr auto', gap: 10, alignItems: 'flex-end', opacity: sDragIdx === idx ? 0.35 : 1, background: sDragOver === idx ? 'var(--accent-muted)' : 'transparent', borderRadius: 'var(--r)', transition: 'background 0.1s' }}>
                  <div style={{ display: 'flex', alignItems: 'center', paddingBottom: 2, cursor: 'grab', color: 'var(--text-3)' }}><I.Grip /></div>
                  <div>
                    {idx === 0 && <label style={lbl}>Series Name *</label>}
                    <input className="form-input" style={inp} list="pv-series" value={entry.name}
                      onChange={e => setForm(p => { const s = [...p.series_entries]; s[idx] = { ...s[idx], name: e.target.value }; return { ...p, series_entries: s }; })}
                      placeholder="e.g. Finance" />
                    <datalist id="pv-series">{cats.primaries.map(c => <option key={c} value={c} />)}</datalist>
                  </div>
                  <div>
                    {idx === 0 && <label style={lbl}>Series Number</label>}
                    <input className="form-input" style={inp} value={entry.number}
                      onChange={e => setForm(p => { const s = [...p.series_entries]; s[idx] = { ...s[idx], number: e.target.value }; return { ...p, series_entries: s }; })}
                      placeholder="e.g. 6" />
                  </div>
                  <div style={{ paddingBottom: 1 }}>
                    {form.series_entries.length > 1 && (
                      <button type="button" onClick={() => setForm(p => ({ ...p, series_entries: p.series_entries.filter((_, i) => i !== idx) }))}
                        style={{ background: 'transparent', border: '1px solid var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32, transition: 'all 0.15s' }}
                        onMouseEnter={e => { e.currentTarget.style.color = 'var(--danger)'; e.currentTarget.style.borderColor = 'var(--danger)'; }}
                        onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                        <I.X />
                      </button>
                    )}
                  </div>
                </div>
              ))}
              <div>
                <button type="button" onClick={() => setForm(p => ({ ...p, series_entries: [...p.series_entries, { name: '', number: '' }] }))}
                  style={{ background: 'transparent', border: '1px dashed var(--border-2)', borderRadius: 'var(--r)', cursor: 'pointer', color: 'var(--text-3)', display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 12px', fontSize: 12, fontFamily: 'var(--font-u)', transition: 'all 0.15s' }}
                  onMouseEnter={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                  onMouseLeave={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border-2)'; }}>
                  <I.Plus /> Add another series
                </button>
              </div>

              {/* 4. Policy Title */}
              {sectionDivider('Policy Title')}
              <div>
                <label style={lbl}>Title *</label>
                <input ref={nameRef} className="form-input" style={{ ...inp, fontSize: 15, fontFamily: 'var(--font-d)', fontWeight: 500 }} value={form.name} onChange={f('name')} placeholder="e.g. Central Centralise Oversight with an Asset Control Ledger" />
              </div>

              {/* 5. Referenced Policies */}
              {sectionDivider('Referenced Policies')}
              <ReferencedPoliciesEditor
                currentPolicyId={mode === 'edit' ? editPolicy?.id : null}
                value={refs}
                onChange={setRefs}
                refTypes={refTypes}
                onChangeRefTypes={setRefTypes}
              />

              {/* 6. Policy Body */}
              {sectionDivider('Policy Content')}
              <div>
                <label style={lbl}>Body *</label>
                <textarea className="form-input" style={{ ...inp, minHeight: 220, resize: 'vertical', lineHeight: 1.8, fontWeight: 300, fontFamily: 'var(--font-policy, var(--font-d))' }} value={form.body} onChange={f('body')} placeholder="Enter the full policy text…" />
              </div>

              {/* 7. Author */}
              {sectionDivider('Author')}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
                <div>
                  <label style={lbl}>Author Name</label>
                  <input className="form-input" style={{ ...inp, textTransform: 'uppercase' }} value={form.author_name} onChange={f('author_name')} placeholder="e.g. JOHN SMITH" />
                </div>
                <div>
                  <label style={lbl}>Author Role</label>
                  <input className="form-input" style={{ ...inp, textTransform: 'uppercase' }} value={form.author_role} onChange={f('author_role')} placeholder="e.g. CHIEF EXECUTIVE OFFICER" />
                </div>
              </div>
              <p style={{ fontSize: 11, color: 'var(--text-3)', marginTop: -8 }}>Displayed in capitals at the end of the policy, right-aligned</p>

              {err && <div style={{ fontSize: 13, color: 'var(--danger)', background: 'var(--danger-bg)', padding: '9px 13px', borderRadius: 'var(--r)', borderLeft: '3px solid var(--danger)' }}>{err}</div>}
            </div>
            <div style={{ padding: '14px 22px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'flex-end', gap: 8, flexShrink: 0 }}>
              <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
              <Btn variant="primary" onClick={save} disabled={saving}>{saving ? 'Saving…' : mode === 'add' ? 'Create Policy' : 'Save Changes'}</Btn>
            </div>
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    //  SETUP SCREEN
    // ══════════════════════════════════════════════════════════════
    const SetupScreen = () => {
      const urlVal = SUPABASE_URL;
      const keyVal = SUPABASE_ANON_KEY;
      const urlOk  = urlVal !== '__SUPABASE_URL__' && urlVal.length > 10;
      const keyOk  = keyVal !== '__SUPABASE_ANON_KEY__' && keyVal.length > 10;
      const diagStyle = { fontSize: 12, fontFamily: 'monospace', padding: '10px 14px', borderRadius: 'var(--r)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 10 };
      return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
        <div style={{ maxWidth: 520, width: '100%' }}>
          <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 50, fontWeight: 300, marginBottom: 10, letterSpacing: '-0.03em' }}>PolicyVault</h1>
          <p style={{ color: 'var(--text-2)', marginBottom: 28, lineHeight: 1.7 }}>Set <code style={{ background: 'var(--surface-2)', padding: '2px 6px', borderRadius: 5, fontSize: 12, fontWeight: 700 }}>SUPABASE_URL</code> and <code style={{ background: 'var(--surface-2)', padding: '2px 6px', borderRadius: 5, fontSize: 12, fontWeight: 700 }}>SUPABASE_ANON_KEY</code> as Netlify environment variables, then trigger a redeploy.</p>

          <div style={{ marginBottom: 20, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', padding: '14px 16px' }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-3)', marginBottom: 10 }}>🔍 Diagnostics</div>
            <div style={{ ...diagStyle, background: urlOk ? 'var(--accent-bg)' : 'var(--danger-bg)', color: urlOk ? 'var(--accent)' : 'var(--danger)' }}>
              <span>{urlOk ? '✓' : '✗'}</span>
              <span>SUPABASE_URL: {urlOk ? urlVal.slice(0, 30) + '…' : `"${urlVal}" (not substituted)`}</span>
            </div>
            <div style={{ ...diagStyle, background: keyOk ? 'var(--accent-bg)' : 'var(--danger-bg)', color: keyOk ? 'var(--accent)' : 'var(--danger)' }}>
              <span>{keyOk ? '✓' : '✗'}</span>
              <span>SUPABASE_ANON_KEY: {keyOk ? keyVal.slice(0, 20) + '…' : `"${keyVal}" (not substituted)`}</span>
            </div>
            {urlOk && keyOk && (
              <div style={{ fontSize: 12, color: 'var(--amber)', marginTop: 6 }}>
                ⚠ Credentials look substituted — hard-refresh the page (Ctrl+Shift+R / Cmd+Shift+R) or clear cache and try again.
              </div>
            )}
          </div>

          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', overflow: 'hidden', boxShadow: 'var(--shadow-sm)' }}>
            {[
              ['Create Supabase project', 'supabase.com → New project (free tier)'],
              ['Run both SQL files', 'SQL Editor: schema.sql then auth-schema.sql'],
              ['Add env vars in Netlify', 'Site → Site configuration → Environment variables'],
              ['Trigger a redeploy', 'Deploys → Trigger deploy → Deploy site'],
              ['Bootstrap first admin', 'Run the UPDATE query at the bottom of auth-schema.sql'],
            ].map(([t, d], i, arr) => (
              <div key={i} style={{ display: 'flex', gap: 14, padding: '14px 20px', borderBottom: i < arr.length - 1 ? '1px solid var(--border)' : 'none', alignItems: 'flex-start' }}>
                <span style={{ minWidth: 24, height: 24, borderRadius: '50%', background: 'var(--accent-bg)', color: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0, marginTop: 1, border: '1px solid rgba(27,82,68,0.15)' }}>{i + 1}</span>
                <div><div style={{ fontSize: 13, fontWeight: 600, marginBottom: 3 }}>{t}</div><div style={{ fontSize: 12, color: 'var(--text-3)', lineHeight: 1.55 }}>{d}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    //  ROOT APP
    // ══════════════════════════════════════════════════════════════
    function App() {
      const [authState, setAuthState]         = useState('loading');
      const [user, setUser]                   = useState(null);
      const [profile, setProfile]             = useState(null);
      const [dark, setDark]                   = useState(() => {
        const s = localStorage.getItem('pv-dark');
        return s !== null ? s === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      });
      const [cats, setCats]                   = useState({ primaries: [], byPrimary: {}, bySecondary: {} });
      const [catsLoading, setCatsLoading]     = useState(false);
      const [policies, setPolicies]           = useState([]);
      const [listLoading, setListLoading]     = useState(false);
      const [query, setQuery]                 = useState('');
      const [sel, setSel]                     = useState({});
      const [activePolicy, setActivePolicy]   = useState(null);
      const [activeId, setActiveId]           = useState(null);
      const [activeIdx, setActiveIdx]         = useState(-1);
      const [detailLoading, setDetailLoading] = useState(false);
      const [policyModal, setPolicyModal]     = useState({ open: false, mode: 'add' });
      const [usersModal, setUsersModal]       = useState(false);
      const [settingsModal, setSettingsModal] = useState(false);
      const [settings, setSettings]           = useState(loadSettings);
      const [userMenu, setUserMenu]           = useState(false);
      const [sidebarOpen, setSidebarOpen]     = useState(true);
      const [listOpen, setListOpen]           = useState(true);
      const searchRef   = useRef(null);
      const userMenuRef = useRef(null);

      useEffect(() => { document.documentElement.setAttribute('data-dark', String(dark)); localStorage.setItem('pv-dark', dark); }, [dark]);

      useEffect(() => {
        const root = document.documentElement;
        const fontMap = { serif: "'Cormorant Garamond', Georgia, serif", sans: "'Plus Jakarta Sans', -apple-system, sans-serif" };
        root.style.setProperty('--font-policy', fontMap[settings.policyFont] || fontMap.serif);
        root.style.setProperty('--font-policy-size', (settings.policyFontSize || '14.5') + 'px');
        root.style.setProperty('--policy-text-color', settings.policyFontColor || '');
      }, [settings]);

      useEffect(() => {
        if (!configured) { setAuthState('unauthenticated'); return; }
        const clearBadSession = async () => {
          try { await db.auth.signOut(); } catch(e) {}
          localStorage.clear(); sessionStorage.clear();
          setUser(null); setProfile(null); setAuthState('unauthenticated');
        };
        const timeout = setTimeout(() => { setAuthState(s => { if (s === 'loading') { clearBadSession(); } return s; }); }, 6000);
        const resolve = async (session) => {
          try {
            if (!session) { setUser(null); setProfile(null); setAuthState('unauthenticated'); return; }
            setUser(session.user);
            const { data: p, error } = await db.from('user_profiles').select('*').eq('id', session.user.id).single();
            if (error) { console.warn('PolicyVault: profile error, clearing session:', error.message); await clearBadSession(); return; }
            setProfile(p);
            setAuthState(p?.approved ? 'authenticated' : 'pending');
          } catch (err) { console.warn('PolicyVault auth error:', err); await clearBadSession(); }
        };
        db.auth.getSession().then(({ data: { session }, error }) => {
          if (error) { console.warn('PolicyVault: bad session, clearing:', error.message); clearBadSession(); }
          else { resolve(session); }
        });
        const { data: { subscription } } = db.auth.onAuthStateChange((event, session) => {
          if (['SIGNED_IN','SIGNED_OUT','TOKEN_REFRESHED','INITIAL_SESSION','USER_UPDATED'].includes(event)) resolve(session);
        });
        return () => { subscription.unsubscribe(); clearTimeout(timeout); };
      }, []);

      useEffect(() => {
        const h = e => { if (userMenuRef.current && !userMenuRef.current.contains(e.target)) setUserMenu(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, []);

      const loadCats = useCallback(async () => { setCatsLoading(true); setCats(await apiGetCats()); setCatsLoading(false); }, []);
      useEffect(() => { if (authState === 'authenticated') loadCats(); }, [authState]);

      const runSearch = useMemo(() => debounce(async ({ q, s }) => {
        setListLoading(true);
        const res = await apiSearch({ query: q, primary: s.primary || '', secondary: s.secondary || '', tertiary: s.tertiary || '' });
        setPolicies(res); setActiveIdx(-1); setListLoading(false);
      }, 280), []);

      useEffect(() => { if (authState === 'authenticated') runSearch({ q: query, s: sel }); }, [query, sel, authState]);

      const openPolicy = useCallback(async (p, idx) => {
        if (p.id === activeId && activePolicy) return;
        setActiveId(p.id); setActiveIdx(idx);
        setActivePolicy(null); setDetailLoading(true);
        setActivePolicy(await apiGetPolicy(p.id));
        setDetailLoading(false);
      }, [activeId, activePolicy]);

      useEffect(() => {
        if (authState !== 'authenticated') return;
        const h = e => {
          if (policyModal.open || usersModal || settingsModal) return;
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          if (e.key === 'ArrowDown') { e.preventDefault(); const n = Math.min(activeIdx + 1, policies.length - 1); if (policies[n]) openPolicy(policies[n], n); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); const n = Math.max(0, activeIdx - 1); if (policies[n]) openPolicy(policies[n], n); }
          else if (e.key === 'Escape') { setActiveId(null); setActivePolicy(null); setActiveIdx(-1); }
          else if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); searchRef.current?.focus(); }
          else if (e.key === 'n' && !e.metaKey && !e.ctrlKey) setPolicyModal({ open: true, mode: 'add' });
        };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [authState, policyModal.open, usersModal, activeIdx, policies, openPolicy]);

      const handleSavePolicy = async (saved) => {
        setPolicyModal({ open: false, mode: 'add' });
        await loadCats();
        runSearch({ q: query, s: sel });
        if (saved) {
          const full = await apiGetPolicy(saved.id);
          setActivePolicy(full || saved);
          setActiveId(saved.id);
          setActiveIdx(-1);
        }
      };

      const handleDeletePolicy = async (id) => {
        await apiDelete(id);
        if (activeId === id) { setActiveId(null); setActivePolicy(null); setActiveIdx(-1); }
        await loadCats();
        runSearch({ q: query, s: sel });
      };

      const handleDeleteSeries = async (primary) => {
        await apiDeleteSeries(primary);
        if (activePolicy?.primary_category === primary) { setActiveId(null); setActivePolicy(null); setActiveIdx(-1); }
        await loadCats();
        runSearch({ q: query, s: sel });
        if (sel.primary === primary) setSel({});
      };

      const handleSignOut = async () => {
        try { await authSignOut(); } catch (e) { console.warn('Sign out error:', e); }
        setUser(null); setProfile(null); setAuthState('unauthenticated'); setUserMenu(false);
      };
      const toggleDark = () => setDark(d => !d);
      const isAdmin    = profile?.role === 'admin';

      if (!configured)                     return <SetupScreen />;
      if (authState === 'loading')         return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, color: 'var(--text-3)' }}>
          <I.Spin />
          <span style={{ fontSize: 13 }}>Loading…</span>
          <button onClick={async () => { try { await authSignOut(); } catch(e) {} setUser(null); setProfile(null); setAuthState('unauthenticated'); }}
            style={{ marginTop: 8, background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 12, color: 'var(--text-3)', textDecoration: 'underline', fontFamily: 'var(--font-u)' }}>
            Taking too long? Click to sign out
          </button>
        </div>
      );
      if (authState === 'unauthenticated') return <AuthPage dark={dark} onToggleDark={toggleDark} />;
      if (authState === 'pending')         return <PendingPage profile={profile} dark={dark} onToggleDark={toggleDark} onSignOut={handleSignOut} />;

      return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          <header className="header-glass" style={{ height: 'var(--header-h)', display: 'flex', alignItems: 'center', padding: '0 16px', borderBottom: '1px solid var(--border)', flexShrink: 0, gap: 12, position: 'sticky', top: 0, zIndex: 10 }}>
            <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 22, fontWeight: 500, letterSpacing: '-0.03em', lineHeight: 1, flexShrink: 0 }}>
              Policy<span style={{ color: 'var(--accent)' }}>Vault</span>
            </h1>
            <div style={{ flex: 1, maxWidth: 520, position: 'relative', display: 'flex', alignItems: 'center' }}>
              <span style={{ position: 'absolute', left: 12, color: 'var(--text-3)', display: 'flex', pointerEvents: 'none' }}><I.Search /></span>
              <input ref={searchRef} type="text" placeholder="Search policies… (⌘K)" value={query} onChange={e => setQuery(e.target.value)} className="search-input"
                style={{ width: '100%', padding: '7px 32px 7px 34px', border: '1px solid var(--border-2)', borderRadius: 999, background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font-u)', fontSize: 13, outline: 'none', transition: 'all 0.15s' }} />
              {query && <button onClick={() => setQuery('')} style={{ position: 'absolute', right: 10, background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-3)', display: 'flex', padding: 2, borderRadius: '50%' }}><I.X /></button>}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginLeft: 'auto', flexShrink: 0 }}>
              <button onClick={toggleDark} title={dark ? 'Light mode' : 'Dark mode'} className="btn-icon"
                style={{ background: 'transparent', border: '1px solid var(--border-2)', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32, borderRadius: 'var(--r)', transition: 'all 0.15s' }}>
                {dark ? <I.Sun /> : <I.Moon />}
              </button>
              <button onClick={() => setSettingsModal(true)} title="Settings" className="btn-icon"
                style={{ background: 'transparent', border: '1px solid var(--border-2)', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32, borderRadius: 'var(--r)', transition: 'all 0.15s' }}>
                <I.Settings />
              </button>
              <Btn variant="primary" size="sm" onClick={() => setPolicyModal({ open: true, mode: 'add' })}><I.Plus /> New Policy</Btn>
              <div ref={userMenuRef} style={{ position: 'relative' }}>
                <button onClick={() => setUserMenu(v => !v)} title={profile?.email} className="btn-icon"
                  style={{ width: 32, height: 32, borderRadius: '50%', background: isAdmin ? 'var(--accent-bg)' : 'var(--surface-2)', border: `1.5px solid ${isAdmin ? 'var(--accent)' : 'var(--border-2)'}`, color: isAdmin ? 'var(--accent)' : 'var(--text-2)', cursor: 'pointer', fontSize: 11, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-u)', transition: 'all 0.15s' }}>
                  {initials(profile?.email)}
                </button>
                {userMenu && (
                  <div className="slide-up" style={{ position: 'absolute', right: 0, top: 'calc(100% + 8px)', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', minWidth: 210, boxShadow: 'var(--shadow-lg)', zIndex: 100, overflow: 'hidden' }}>
                    <div style={{ padding: '14px 16px', borderBottom: '1px solid var(--border)' }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{profile?.email}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-3)', display: 'flex', alignItems: 'center', gap: 4 }}>
                        {isAdmin ? <><I.Shield /><span style={{ color: 'var(--accent)', fontWeight: 700 }}>Administrator</span></> : <span>User</span>}
                      </div>
                    </div>
                    {isAdmin && (
                      <button onClick={() => { setUsersModal(true); setUserMenu(false); }} className="menu-item"
                        style={{ width: '100%', textAlign: 'left', padding: '10px 16px', background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 13, color: 'var(--text)', display: 'flex', alignItems: 'center', gap: 9, fontFamily: 'var(--font-u)', borderBottom: '1px solid var(--border)', transition: 'background 0.1s' }}>
                        <I.Users /> Manage Users
                      </button>
                    )}
                    <button onClick={handleSignOut} className="menu-item-danger"
                      style={{ width: '100%', textAlign: 'left', padding: '10px 16px', background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 13, color: 'var(--danger)', display: 'flex', alignItems: 'center', gap: 9, fontFamily: 'var(--font-u)', transition: 'background 0.1s' }}>
                      <I.LogOut /> Sign Out
                    </button>
                  </div>
                )}
              </div>
            </div>
          </header>

          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

            {/* ── Collapsible Sidebar ── */}
            <div className="panel-collapsible" style={{ width: sidebarOpen ? 'var(--sidebar-w)' : 0 }}>
              <div style={{ width: 'var(--sidebar-w)', height: '100%', borderRight: '1px solid var(--border)' }}>
                <Sidebar cats={cats} sel={sel} onSelect={ns => { setSel(ns); setActiveId(null); setActivePolicy(null); setActiveIdx(-1); }} loading={catsLoading} onDeleteSeries={handleDeleteSeries} />
              </div>
            </div>
            {/* Sidebar toggle strip */}
            <button className="panel-toggle" onClick={() => setSidebarOpen(v => !v)}
              title={sidebarOpen ? 'Collapse series panel' : 'Expand series panel'}>
              {sidebarOpen ? <I.CLeft /> : <I.CRight />}
            </button>

            {/* ── Collapsible Policy List ── */}
            <div className="panel-collapsible" style={{ width: listOpen ? 'var(--list-w)' : 0 }}>
              <div style={{ width: 'var(--list-w)', height: '100%', display: 'flex', flexDirection: 'column', borderRight: '1px solid var(--border)' }}>
                <div style={{ padding: '8px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
                  <span style={{ fontSize: 11, color: 'var(--text-3)', fontWeight: 700, letterSpacing: '0.04em' }}>{listLoading ? 'Searching…' : `${policies.length} ${policies.length === 1 ? 'policy' : 'policies'}`}</span>
                  {query && <span style={{ fontSize: 11, color: 'var(--accent)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 140, fontWeight: 700 }}>"{query}"</span>}
                </div>
                <PolicyList policies={policies} selectedId={activeId} onSelect={openPolicy} loading={listLoading} query={query} onDeletePolicy={handleDeletePolicy} />
                {policies.length > 1 && (
                  <div style={{ padding: '7px 16px', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                    <I.Kbd k="↑" /><I.Kbd k="↓" /><span style={{ fontSize: 11, color: 'var(--text-3)' }}>navigate</span>
                  </div>
                )}
              </div>
            </div>
            {/* List toggle strip */}
            <button className="panel-toggle" onClick={() => setListOpen(v => !v)}
              title={listOpen ? 'Collapse policy list' : 'Expand policy list'}>
              {listOpen ? <I.CLeft /> : <I.CRight />}
            </button>

            {/* ── Policy Detail (always visible, fills remaining space) ── */}
            <div style={{ flex: 1, display: 'flex', overflow: 'hidden', minWidth: 0 }}>
              <PolicyDetail policy={activePolicy} loading={detailLoading} onEdit={() => setPolicyModal({ open: true, mode: 'edit' })} onNavigate={(ref) => openPolicy(ref, -1)} />
            </div>

          </div>

          <PolicyModal open={policyModal.open} mode={policyModal.mode} editPolicy={policyModal.mode === 'edit' ? activePolicy : null} cats={cats} settings={settings} onSave={handleSavePolicy} onClose={() => setPolicyModal(m => ({ ...m, open: false }))} />
          <UserManagementModal open={usersModal} currentUserId={user?.id} onClose={() => setUsersModal(false)} />
          <SettingsModal open={settingsModal} settings={settings} dark={dark} onToggleDark={toggleDark} profile={profile} isAdmin={isAdmin} onManageUsers={() => { setUsersModal(true); setSettingsModal(false); }} onSignOut={handleSignOut} onSave={s => { setSettings(s); saveSettingsToStorage(s); }} onClose={() => setSettingsModal(false)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);


  </script>
</body>
</html>
